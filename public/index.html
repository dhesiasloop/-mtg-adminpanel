/* ── Users Page ─────────────────────────────────────────── */
function UsersPage({ node, onBack }) {
  const [users, setUsers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [ref, setRef] = useState(false);
  const [modal, setModal] = useState(false);
  const [busy, setBusy] = useState({});
  const [editU, setEditU] = useState(null);
  const [qrU, setQrU] = useState(null);
  const [traffic, setTraffic] = useState({});

  const loadUsers = useCallback(async (silent=false) => {
    if(silent) setRef(true); else setLoading(true);
    try { const u = await api('GET',`/api/nodes/${node.id}/users`); setUsers(u); }
    finally { setLoading(false); setRef(false); }
  }, [node.id]);

  const loadTraffic = useCallback(async () => {
    try { const t = await api('GET',`/api/nodes/${node.id}/traffic`); setTraffic(t||{}); } catch {}
  }, [node.id]);

  const syncUsers = async () => {
    try {
      const r = await api('POST',`/api/nodes/${node.id}/sync`);
      toast(`Синхронизировано: ${r.imported} новых из ${r.total}`, r.imported>0?'success':'info');
      loadUsers(true);
    } catch(e){toast(e.message,'error');}
  };

  useEffect(()=>{ loadUsers(); loadTraffic(); },[loadUsers,loadTraffic]);
  useEffect(()=>{ const t=setInterval(()=>loadTraffic(),30000); return()=>clearInterval(t); },[loadTraffic]);

  const setBusyFor = (n,v) => setBusy(b=>({...b,[n]:v}));

  const remove = async (user) => {
    if(!confirm(`Удалить ${user.name}?`)) return;
    setBusyFor(user.name,true);
    try { await api('DELETE',`/api/nodes/${node.id}/users/${user.name}`); toast(`${user.name} удалён`,'success'); loadUsers(true); }
    catch(e){toast(e.message,'error');}
    finally{setBusyFor(user.name,false);}
  };

  const toggle = async (user) => {
    const action = user.running?'stop':'start';
    setUsers(p=>p.map(u=>u.name===user.name?{...u,running:!user.running}:u));
    setBusyFor(user.name,true);
    try { await api('POST',`/api/nodes/${node.id}/users/${user.name}/${action}`); toast(`${user.name}: ${action==='stop'?'остановлен':'запущен'}`,'success'); }
    catch(e){ setUsers(p=>p.map(u=>u.name===user.name?{...u,running:user.running}:u)); toast(e.message,'error'); }
    finally{setBusyFor(user.name,false);}
  };

  const resetTraffic = async (user) => {
    if(!confirm(`Сбросить трафик ${user.name}? Прокси будет перезапущен.`)) return;
    setBusyFor(user.name+'_reset', true);
    try {
      await api('POST', `/api/nodes/${node.id}/users/${user.name}/reset-traffic`);
      toast(`${user.name}: трафик сброшен`, 'success');
      loadUsers(true);
      setTimeout(()=>loadTraffic(), 1500);
    } catch(e){toast(e.message,'error');}
    finally{setBusyFor(user.name+'_reset', false);}
  };

  return (
    <div className="pg">
      <div className="topbar">
        <div className="topbar-left" style={{display:'flex',alignItems:'center',gap:14}}>
          <button className="btn btn-ghost btn-sm" onClick={onBack}><I.ArrowLeft/> Назад</button>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            {node.flag && <img src={flagUrl(node.flag,'w80')} alt={node.flag} style={{width:30,height:22,objectFit:'cover',borderRadius:3,boxShadow:'0 1px 4px rgba(0,0,0,.3)',flexShrink:0}}/>}
            <div>
              <div className="page-title" style={{marginBottom:0}}><em>{node.name}</em></div>
              <div className="page-desc" style={{marginTop:0}}>{node.host}</div>
            </div>
          </div>
        </div>
        <div className="topbar-right">
          {ref && <span className="refreshing"><span className="spin"/> обновление</span>}
          <button className="btn btn-ghost btn-sm" onClick={()=>loadUsers(true)}><I.RefreshCw/></button>
          <button className="btn btn-secondary btn-sm" onClick={syncUsers}><I.Sync/> Синхр.</button>
          <button className="btn btn-primary btn-sm" onClick={()=>setModal(true)}><I.Plus/> Добавить</button>
        </div>
      </div>

      <div className="card">
        {loading ? <div className="loading-center"><span className="spin"/> Загружаю юзеров...</div> : (
          <div className="table-wrap">
            <table>
              <thead><tr>
                <th>Клиент</th>
                <th>Порт</th>
                <th>Онлайн</th>
                <th>Устройств</th>
                <th>Трафик</th>
                <th>Статус</th>
                <th>Срок / Лимит</th>
                <th>Заметка</th>
                <th>Действия</th>
              </tr></thead>
              <tbody>
                {users.map(u => {
                  const traf = u.running
                    ? traffic[u.name]
                    : (u.traffic_rx_snap ? {rx:u.traffic_rx_snap, tx:u.traffic_tx_snap} : traffic[u.name]);
                  const devLimit = u.max_devices;
                  const devOver = devLimit && u.connections > devLimit;
                  return (
                  <tr key={u.id} style={{opacity:u.expired ? 0.5 : 1}}>
                    <td><span style={{fontFamily:'var(--mono)',fontWeight:600,fontSize:14}}>{u.name}</span></td>
                    <td><span className="badge badge-purple">{u.port}</span></td>
                    <td>
                      {u.is_online
                        ? <span className="badge badge-green"><span className="dot dot-live"/>online</span>
                        : <span style={{color:'var(--t3)',fontSize:12}}>—</span>}
                    </td>
                    <td>
                      <span style={{fontFamily:'var(--mono)',fontWeight:500,fontSize:14,
                        color: devOver ? 'var(--re)' : u.connections > 0 ? 'var(--vi)' : 'var(--t3)'}}
                        title={devLimit ? `Лимит: ${devLimit} устройств` : 'Без ограничений'}>
                        {u.connections}{devLimit ? `/${devLimit}` : ''}
                      </span>
                    </td>
                    <td>
                      {traf
                        ? <span className="traf">
                            <span className="rx">↓{traf.rx}</span>
                            <span className="tx"> ↑{traf.tx}</span>
                            {!u.running && u.traffic_rx_snap && <span style={{fontSize:10,color:'var(--t3)',marginLeft:4}} title="Снапшот на момент паузы">⏸</span>}
                          </span>
                        : <span style={{color:'var(--t3)',fontSize:12}}>—</span>}
                    </td>
                    <td>
                      <span className={`badge ${u.running?'badge-green':'badge-red'}`}>
                        <span className={`dot ${u.running?'dot-live':''}`}/>
                        {u.running?'active':'stopped'}
                      </span>
                    </td>
                    <td>
                      <div style={{display:'flex',flexDirection:'column',gap:3}}>
                        {u.expires_at && <div>{expiryBadge(u.expires_at)}</div>}
                        {u.traffic_limit_gb && <span style={{fontSize:11,color:'var(--t3)',fontFamily:'var(--mono)'}}>{u.traffic_limit_gb}GB</span>}
                        {!u.expires_at && !u.traffic_limit_gb && <span style={{color:'var(--t3)',fontSize:12}}>∞</span>}
                        {u.traffic_reset_interval && u.traffic_reset_interval !== 'never' && (
                          <span style={{fontSize:10,color:'var(--vi)'}} title={u.next_reset_at ? `Следующий: ${new Date(u.next_reset_at).toLocaleString('ru-RU')}` : ''}>
                            ↺ {u.traffic_reset_interval === 'daily' ? 'день' : u.traffic_reset_interval === 'monthly' ? 'мес' : 'год'}
                          </span>
                        )}
                      </div>
                    </td>
                    <td style={{maxWidth:120,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:13,color:'var(--t2)'}} title={u.note}>
                      {u.note || <span style={{color:'var(--t3)'}}>—</span>}
                    </td>
                    <td>
                      <div className="acts">
                        <button className={`btn btn-icon btn-sm ${u.running?'btn-ghost':'btn-primary'}`}
                          onClick={()=>toggle(u)} disabled={busy[u.name]} title={u.running?'Остановить':'Запустить'}>
                          {busy[u.name]?<span className="spin spin-sm"/>:(u.running?<I.Pause/>:<I.Play/>)}
                        </button>
                        <button className="btn btn-icon btn-secondary btn-sm" onClick={()=>copyText(u.link)} title="Копировать ссылку"><I.Copy/></button>
                        <button className="btn btn-icon btn-secondary btn-sm" onClick={()=>setQrU(u)} title="QR-код"><I.QrCode/></button>
                        <button className="btn btn-icon btn-secondary btn-sm" onClick={()=>setEditU(u)} title="Редактировать"><I.Edit/></button>
                        <button className="btn btn-icon btn-secondary btn-sm" onClick={()=>resetTraffic(u)}
                          disabled={busy[u.name+'_reset']} title="Сбросить трафик (перезапуск прокси)">
                          {busy[u.name+'_reset']?<span className="spin spin-sm"/>:<I.RefreshCw/>}
                        </button>
                        <button className="btn btn-icon btn-danger btn-sm" onClick={()=>remove(u)} disabled={busy[u.name]} title="Удалить"><I.Trash/></button>
                      </div>
                    </td>
                  </tr>
                  );
                })}
                {!users.length && <tr><td colSpan={9}><div className="empty"><div className="empty-icon"><I.Users/></div><div className="empty-title">Нет клиентов</div><div className="empty-desc">Добавь первого клиента</div></div></td></tr>}
              </tbody>
            </table>
          </div>
        )}
      </div>

      {modal && <AddUserModal nodeId={node.id} onClose={()=>setModal(false)} onSave={()=>{setModal(false);loadUsers(true);}}/>}
      {qrU && <QRModal user={qrU} onClose={()=>setQrU(null)}/>}
      {editU && <EditModal user={editU} nodeId={node.id} onClose={()=>setEditU(null)} onSave={()=>{setEditU(null);loadUsers(true);}}/>}
    </div>
  );
}

/* ── All Clients (grouped by node) ─────────────────────── */
function AllUsers({ nodes, onSelectNode }) {
  const [groups, setGroups] = useState({}); // { nodeId: users[] }
  const [loading, setLoading] = useState(true);
  const [refreshing, setRefreshing] = useState(false);

  const load = useCallback(async (silent=false) => {
    if(silent) setRefreshing(true); else setLoading(true);
    try {
      const res = await Promise.all(nodes.map(async n => {
        try {
          const [users, traffic] = await Promise.all([
            api('GET', `/api/nodes/${n.id}/users`),
            api('GET', `/api/nodes/${n.id}/traffic`).catch(() => ({}))
          ]);
          // Merge traffic into each user
          return [n.id, users.map(u => ({...u, traffic: traffic[u.name] || null}))];
        } catch { return [n.id, []]; }
      }));
      setGroups(Object.fromEntries(res));
    } finally { setLoading(false); setRefreshing(false); }
  }, [nodes]);

  useEffect(() => { load(); }, [load]);

  const totalUsers = Object.values(groups).reduce((a, u) => a + u.length, 0);
  const totalActive = Object.values(groups).reduce((a, u) => a + u.filter(x => x.running).length, 0);

  return (
    <div className="pg">
      <div className="topbar">
        <div className="topbar-left">
          <div className="page-title">Все <em>клиенты</em></div>
          <div className="page-desc">
            {loading ? '...' : `${totalUsers} клиентов · ${totalActive} активных · ${nodes.length} нод`}
          </div>
        </div>
        <div className="topbar-right">
          {refreshing && <span className="refreshing"><span className="spin"/></span>}
          <button className="btn btn-ghost btn-sm" onClick={()=>load(true)}><I.RefreshCw/> Обновить</button>
        </div>
      </div>

      {loading ? <div className="loading-center"><span className="spin"/> Загружаю...</div> : (
        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          {nodes.map(node => {
            const users = groups[node.id] || [];
            const active = users.filter(u => u.running).length;
            return (
              <div className="card" key={node.id}>
                {/* Node header */}
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom: users.length ? 16 : 0}}>
                  <div style={{display:'flex',alignItems:'center',gap:12}}>
                    <div className="node-icon" style={{width:34,height:34,borderRadius:9}}><I.Server/></div>
                    <div>
                      <div style={{fontWeight:600,fontSize:14}}>{node.name}</div>
                      <div style={{fontSize:11,color:'var(--t3)',fontFamily:'var(--mono)'}}>{node.host}</div>
                    </div>
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    {users.length > 0 && (
                      <div style={{display:'flex',gap:6}}>
                        <span className="badge badge-green">{active} active</span>
                        <span className="badge badge-purple">{users.length} total</span>
                      </div>
                    )}
                    <button className="btn btn-primary btn-sm" onClick={()=>onSelectNode(node)}>
                      <I.Users/> Управление
                    </button>
                  </div>
                </div>

                {users.length > 0 && (
                  <div className="table-wrap">
                    <table>
                      <thead><tr>
                        <th>Клиент</th>
                        <th>Порт</th>
                        <th>Подкл.</th>
                        <th>Трафик</th>
                        <th>Статус</th>
                        <th>Срок</th>
                        <th>Заметка</th>
                        <th></th>
                      </tr></thead>
                      <tbody>
                        {users.map(u => (
                          <tr key={u.id} style={{opacity: u.expired ? 0.5 : 1}}>
                            <td><span style={{fontFamily:'var(--mono)',fontWeight:600,fontSize:13}}>{u.name}</span></td>
                            <td><span className="badge badge-purple">{u.port}</span></td>
                            <td><span style={{fontFamily:'var(--mono)',fontSize:13,color:'var(--vi)'}}>{u.connections}</span></td>
                            <td>
                              {u.traffic
                                ? <span className="traf"><span className="rx">↓{u.traffic.rx}</span><span className="tx"> ↑{u.traffic.tx}</span></span>
                                : <span style={{color:'var(--t3)',fontSize:11}}>—</span>}
                            </td>
                            <td>
                              <span className={`badge ${u.running?'badge-green':'badge-red'}`}>
                                <span className={`dot ${u.running?'dot-live':''}`}/>{u.running?'active':'stopped'}
                              </span>
                            </td>
                            <td>{expiryBadge(u.expires_at, true)}</td>
                            <td style={{maxWidth:100,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:12,color:'var(--t2)'}} title={u.note}>
                              {u.note || <span style={{color:'var(--t3)'}}>—</span>}
                            </td>
                            <td>
                              <div className="acts">
                                <button className="btn btn-icon btn-secondary btn-sm" onClick={()=>copyText(u.link)} title="Копировать ссылку"><I.Copy/></button>
                              </div>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}

                {users.length === 0 && (
                  <div style={{color:'var(--t3)',fontSize:12,textAlign:'center',padding:'12px 0'}}>
                    Нет клиентов на этой ноде
                  </div>
                )}
              </div>
            );
          })}
          {!nodes.length && (
            <div className="empty"><div className="empty-icon"><I.Users/></div><div className="empty-title">Нет нод</div></div>
          )}
        </div>
      )}
    </div>
  );
}

/* ── Settings ───────────────────────────────────────────── */
function Settings() {
  const [enabled, setEnabled] = useState(false);
  const [data, setData] = useState(null);
  const [verify, setVerify] = useState('');
  const [disable, setDisable] = useState('');
  const [loading, setLoading] = useState(false);
  const [step, setStep] = useState('idle');

  useEffect(()=>{ api('GET','/api/totp/status').then(r=>setEnabled(r.enabled)).catch(()=>{}); },[]);

  const startSetup = async () => {
    setLoading(true);
    try { const d=await api('POST','/api/totp/setup'); setData(d); setStep('setup'); }
    catch(e){toast(e.message,'error');} finally{setLoading(false);}
  };

  const confirmEnable = async () => {
    if(verify.length!==6) return;
    setLoading(true);
    try { await api('POST','/api/totp/verify',{code:verify}); toast('2FA включена!','success'); setEnabled(true); setStep('idle'); setData(null); setVerify(''); }
    catch { toast('Неверный код','error'); } finally{setLoading(false);}
  };

  const confirmDisable = async () => {
    if(disable.length!==6) return;
    setLoading(true);
    try { await api('POST','/api/totp/disable',{code:disable}); toast('2FA отключена','success'); setEnabled(false); setStep('idle'); setDisable(''); setTotpCode(''); }
    catch { toast('Неверный код','error'); } finally{setLoading(false);}
  };

  return (
    <div className="pg">
      <div className="topbar">
        <div className="topbar-left">
          <div className="page-title"><em>Настройки</em></div>
        </div>
      </div>

      <div className="card" style={{maxWidth:520}}>
        <div className="card-header">
          <div className="card-title"><I.Shield/> Двухфакторная аутентификация</div>
          <span className={`badge ${enabled?'badge-green':'badge-red'}`}>
            <span className={`dot ${enabled?'dot-live':''}`}/>{enabled?'включена':'выключена'}
          </span>
        </div>

        <p style={{fontSize:13,color:'var(--t3)',marginBottom:18}}>
          Google Authenticator / любое TOTP-приложение
        </p>

        {step==='idle' && (!enabled
          ? <button className="btn btn-primary" onClick={startSetup} disabled={loading}>{loading?<span className="spin spin-sm"/>:<><I.Shield/> Включить 2FA</>}</button>
          : <button className="btn btn-danger" onClick={()=>setStep('disable')}><I.X/> Отключить 2FA</button>
        )}

        {step==='setup' && data && (<div>
          <div style={{background:'var(--bg3)',border:'1px solid var(--b1)',borderRadius:10,padding:'12px 14px',marginBottom:16,fontSize:12,color:'var(--t2)',lineHeight:1.9}}>
            1. Открой Google Authenticator<br/>
            2. Нажми "+" → "Сканировать QR-код"<br/>
            3. Введи 6-значный код для подтверждения
          </div>
          <div style={{textAlign:'center',marginBottom:16}}>
            <div style={{display:'inline-block',padding:16,background:'#fff',borderRadius:12}}
              ref={el=>{if(el&&el.children.length===0&&typeof QRCode!=='undefined'){new QRCode(el,{text:data.qr,width:200,height:200,correctLevel:QRCode.CorrectLevel.M});}}}/>
          </div>
          <div style={{background:'var(--bg3)',border:'1px solid var(--b1)',borderRadius:9,padding:'10px 14px',marginBottom:16,fontFamily:'var(--mono)',fontSize:12,color:'var(--cy)',wordBreak:'break-all',textAlign:'center'}}>
            <div style={{fontSize:10,color:'var(--t3)',marginBottom:4}}>Секрет (если QR не работает):</div>
            {data.secret}
          </div>
          <div className="form-group"><label className="form-label">Код подтверждения</label>
            <input className="form-input totp-code-input" type="text" inputMode="numeric" placeholder="——————"
              value={verify} maxLength={6} onChange={e=>setVerify(e.target.value.replace(/\D/g,''))} autoFocus/>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-ghost" onClick={()=>{setStep('idle');setData(null);}}>Отмена</button>
            <button className="btn btn-primary" onClick={confirmEnable} disabled={loading||verify.length!==6} style={{flex:1,justifyContent:'center'}}>
              {loading?<span className="spin spin-sm"/>:<><I.Check/> Подтвердить и включить</>}
            </button>
          </div>
        </div>)}

        {step==='disable' && (<div>
          <div style={{background:'rgba(251,113,133,0.05)',border:'1px solid rgba(251,113,133,0.15)',borderRadius:10,padding:'12px 14px',marginBottom:16,fontSize:13,color:'var(--re)'}}>
            Введи текущий код из приложения для отключения 2FA
          </div>
          <div className="form-group"><label className="form-label">Код из приложения</label>
            <input className="form-input totp-code-input" type="text" inputMode="numeric" placeholder="——————"
              value={disable} maxLength={6} onChange={e=>setDisable(e.target.value.replace(/\D/g,''))} autoFocus/>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-ghost" onClick={()=>setStep('idle')}>Отмена</button>
            <button className="btn btn-danger" onClick={confirmDisable} disabled={loading||disable.length!==6} style={{flex:1,justifyContent:'center'}}>
              {loading?<span className="spin spin-sm"/>:<><I.X/> Отключить 2FA</>}
            </button>
          </div>
        </div>)}
      </div>
    </div>
  );
}

              {editing!=='new' && <div className="form-group"><label className="form-label">Статус</label>

                </select></div>}
            </div>
            <div style={{display:'flex',gap:8,marginTop:12}}>

        ) : (

            <thead><tr><th>Логин</th><th>Имя</th><th>Роль</th><th>Статус</th><th>Последний вход</th><th></th></tr></thead>
            <tbody>{users.map(u => (
              <tr key={u.id}>
                <td style={{fontFamily:'var(--mono)',fontSize:13}}>{u.username}</td>
                <td>{u.display_name||'—'}</td>
                <td><span className={`badge ${ROLE_COLORS[u.role]||''}`}>{ROLES[u.role]||u.role}</span></td>
                <td><span className={`badge ${u.status==='active'?'badge-green':'badge-red'}`}>{u.status==='active'?'Активен':'Отключён'}</span></td>
                <td style={{fontSize:12,color:'var(--t3)'}}>{u.last_login_at?new Date(u.last_login_at).toLocaleString('ru'):'—'}</td>
                <td>
                  <div style={{display:'flex',gap:6}}>
                    <button className="btn btn-ghost btn-sm" onClick={()=>setEditing(u)}><I.Settings/></button>
                    <button className="btn btn-ghost btn-sm" style={{color:'var(--re)'}} onClick={()=>remove(u.id)}><I.X/></button>
                  </div>
                </td>

            ))}</tbody>
          </table></div>
        )}
      </div>
    </div>
  );
}

/* ── Customers Manager (registered site users) ──────────── */
function CustomersManager() {
  const [customers, setCustomers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [search, setSearch] = useState('');
  const [selected, setSelected] = useState(null); // customer detail
  const [detail, setDetail] = useState(null);
  const [detailLoading, setDetailLoading] = useState(false);
  const [editing, setEditing] = useState(false);

  const load = () => { api('GET','/api/customers').then(setCustomers).catch(()=>{}).finally(()=>setLoading(false)); };
  useEffect(()=>{ load(); },[]);

  const openDetail = async (c) => {
    setSelected(c); setDetailLoading(true); setEditing(false);
    try { const d = await api('GET',`/api/customers/${c.id}`); setDetail(d); }
    catch { toast('Ошибка загрузки','error'); }
    finally { setDetailLoading(false); }
  };

  const toggleStatus = async (c) => {
    const newStatus = c.status==='active'?'banned':'active';
    try { await api('PUT',`/api/customers/${c.id}/status`,{status:newStatus}); toast(newStatus==='banned'?'Заблокирован':'Разблокирован','success'); load(); if(detail) setDetail({...detail,status:newStatus}); }
    catch(e){ toast(e.message,'error'); }
  };

  const saveEdit = async (e) => {
    e.preventDefault();
    const f = new FormData(e.target);
    try {
      await api('PUT',`/api/customers/${selected.id}`,{
        name: f.get('name'), email: f.get('email'),
        balance: parseFloat(f.get('balance'))||0,
        status: f.get('status')
      });
      toast('Сохранено','success'); setEditing(false); load();
      openDetail(selected);
    } catch(e){ toast(e.message,'error'); }
  };

  const removeCustomer = async (id) => {
    if(!confirm('Удалить клиента и все его заказы/платежи? Это необратимо!')) return;
    try { await api('DELETE',`/api/customers/${id}`); toast('Удалён','success'); setSelected(null); setDetail(null); load(); }
    catch(e){ toast(e.message,'error'); }
  };

  const cancelOrder = async (orderId) => {
    try { await api('PUT',`/api/orders/${orderId}/status`,{status:'cancelled'}); toast('Заказ отменён','success'); openDetail(selected); }
    catch(e){ toast(e.message,'error'); }
  };

  const filtered = customers.filter(c => {
    if(!search) return true;
    const s = search.toLowerCase();
    return (c.email||'').toLowerCase().includes(s) || (c.name||'').toLowerCase().includes(s) ||
           (c.telegram_username||'').toLowerCase().includes(s) || String(c.id).includes(s);
  });

  const STATUS_BADGE = {active:'badge-green', banned:'badge-red'};
  const ORDER_BADGE = {active:'badge-green', pending:'badge-amber', cancelled:'badge-red', expired:'badge-purple', error:'badge-red'};
  const PAY_BADGE = {succeeded:'badge-green', pending:'badge-amber', cancelled:'badge-red'};

  if(selected && detail) {
    return (
      <div className="pg">
        <div className="topbar">
          <div className="topbar-left">
            <button className="btn btn-ghost btn-sm" onClick={()=>{setSelected(null);setDetail(null);}}><I.ArrowLeft/> Назад</button>
            <div className="page-title">Клиент <em>#{detail.id}</em></div>
          </div>
          <div className="topbar-right">
            <button className="btn btn-ghost btn-sm" onClick={()=>setEditing(!editing)}><I.Settings/> Редактировать</button>
            <button className={`btn btn-sm ${detail.status==='active'?'btn-ghost':'btn-primary'}`} style={detail.status==='active'?{color:'var(--re)'}:{}} onClick={()=>toggleStatus(detail)}>
              {detail.status==='active'?'Заблокировать':'Разблокировать'}
            </button>
            <button className="btn btn-ghost btn-sm" style={{color:'var(--re)'}} onClick={()=>removeCustomer(detail.id)}><I.X/> Удалить</button>
          </div>
        </div>

        {detailLoading ? <div className="loading-center"><span className="spin"/> Загрузка...</div> : (
          <div style={{display:'flex',flexDirection:'column',gap:16}}>
            {/* Info card */}
            {editing ? (
              <form className="card" onSubmit={saveEdit}>
                <div className="card-header"><div className="card-title">Редактирование</div></div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                  <div className="form-group"><label className="form-label">Имя</label>
                    <input className="form-input" name="name" defaultValue={detail.name||''}/></div>
                  <div className="form-group"><label className="form-label">Email</label>
                    <input className="form-input" name="email" type="email" defaultValue={detail.email||''}/></div>
                  <div className="form-group"><label className="form-label">Баланс</label>
                    <input className="form-input" name="balance" type="number" step="0.01" defaultValue={detail.balance||0}/></div>
                  <div className="form-group"><label className="form-label">Статус</label>
                    <select className="form-input" name="status" defaultValue={detail.status}>
                      <option value="active">Активен</option><option value="banned">Заблокирован</option>
                    </select></div>
                </div>
                <div style={{display:'flex',gap:8,marginTop:12}}>
                  <button className="btn btn-ghost btn-sm" type="button" onClick={()=>setEditing(false)}>Отмена</button>
                  <button className="btn btn-primary btn-sm" type="submit"><I.Save/> Сохранить</button>
                </div>
              </form>
            ) : (
              <div className="card">
                <div className="card-header"><div className="card-title"><I.User/> Информация</div></div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:16}}>
                  <div><div style={{fontSize:11,color:'var(--t3)'}}>ID</div><div style={{fontFamily:'var(--mono)',fontSize:13}}>#{detail.id}</div></div>
                  <div><div style={{fontSize:11,color:'var(--t3)'}}>Имя</div><div>{detail.name||'—'}</div></div>
                  <div><div style={{fontSize:11,color:'var(--t3)'}}>Email</div><div style={{fontFamily:'var(--mono)',fontSize:13}}>{detail.email||'—'} {detail.email_verified?'✓':''}</div></div>
                  <div><div style={{fontSize:11,color:'var(--t3)'}}>Telegram</div><div>{detail.telegram_username?`@${detail.telegram_username}`:'—'} {detail.telegram_id?`(${detail.telegram_id})`:''}</div></div>
                  <div><div style={{fontSize:11,color:'var(--t3)'}}>Баланс</div><div style={{fontWeight:600}}>{(detail.balance||0).toFixed(2)} ₽</div></div>
                  <div><div style={{fontSize:11,color:'var(--t3)'}}>Статус</div><span className={`badge ${STATUS_BADGE[detail.status]||''}`}>{detail.status==='active'?'Активен':'Заблокирован'}</span></div>
                  <div><div style={{fontSize:11,color:'var(--t3)'}}>Регистрация</div><div style={{fontSize:12}}>{new Date(detail.created_at).toLocaleString('ru')}</div></div>
                  <div><div style={{fontSize:11,color:'var(--t3)'}}>Последний вход</div><div style={{fontSize:12}}>{detail.last_login_at?new Date(detail.last_login_at).toLocaleString('ru'):'—'}</div></div>
                </div>
              </div>
            )}

            {/* Orders */}
            <div className="card">
              <div className="card-header"><div className="card-title"><I.Tag/> Заказы ({(detail.orders||[]).length})</div></div>
              {(detail.orders||[]).length===0 ? <p style={{color:'var(--t3)',fontSize:13}}>Нет заказов</p> : (
                <div className="tbl-wrap"><table className="tbl">
                  <thead><tr><th>#</th><th>Тариф</th><th>Статус</th><th>Цена</th><th>Период</th><th>Истекает</th><th>Создан</th><th></th></tr></thead>
                  <tbody>{(detail.orders||[]).map(o => (
                    <tr key={o.id}>
                      <td style={{fontFamily:'var(--mono)',fontSize:12}}>{o.id}</td>
                      <td>{o.plan_id||'—'}</td>
                      <td><span className={`badge ${ORDER_BADGE[o.status]||''}`}>{o.status}</span></td>
                      <td>{o.price} {o.currency}</td>
                      <td>{o.period==='monthly'?'Мес.':o.period==='yearly'?'Год':'День'}</td>
                      <td style={{fontSize:12}}>{o.expires_at?new Date(o.expires_at).toLocaleDateString('ru'):'—'}</td>
                      <td style={{fontSize:12}}>{new Date(o.created_at).toLocaleDateString('ru')}</td>
                      <td>{o.status==='active'||o.status==='pending'?<button className="btn btn-ghost btn-sm" style={{color:'var(--re)'}} onClick={()=>cancelOrder(o.id)}>Отменить</button>:null}</td>
                    </tr>
                  ))}</tbody>
                </table></div>
              )}
            </div>

            {/* Payments */}
            <div className="card">
              <div className="card-header"><div className="card-title"><I.CreditCard/> Платежи ({(detail.payments||[]).length})</div></div>
              {(detail.payments||[]).length===0 ? <p style={{color:'var(--t3)',fontSize:13}}>Нет платежей</p> : (
                <div className="tbl-wrap"><table className="tbl">
                  <thead><tr><th>#</th><th>Заказ</th><th>Сумма</th><th>Статус</th><th>Способ</th><th>Дата</th><th></th></tr></thead>
                  <tbody>{(detail.payments||[]).map(p => (
                    <tr key={p.id}>
                      <td style={{fontFamily:'var(--mono)',fontSize:12}}>{p.id}</td>
                      <td style={{fontFamily:'var(--mono)',fontSize:12}}>#{p.order_id}</td>
                      <td style={{fontWeight:600}}>{p.amount} {p.currency}</td>
                      <td><span className={`badge ${PAY_BADGE[p.status]||''}`}>{p.status==='succeeded'?'Оплачен':p.status==='pending'?'Ожидание':'Отменён'}</span></td>
                      <td>{p.method||'—'}</td>
                      <td style={{fontSize:12}}>{new Date(p.created_at).toLocaleString('ru')}</td>
                      <td>{p.status==='pending'&&<button className="btn btn-ghost btn-sm" onClick={async(e)=>{e.stopPropagation();try{const r=await api('POST',`/api/payments/${p.id}/check`);toast(r.changed?`Статус: ${r.status}`:'Статус не изменился',r.changed?'success':'info');if(r.changed)openDetail(selected);}catch(er){toast(er.message,'error');}}}>Проверить</button>}</td>
                    </tr>
                  ))}</tbody>
                </table></div>
              )}
            </div>
          </div>
        )}
      </div>
    );
  }

  return (
    <div className="pg">
      <div className="topbar">
        <div className="topbar-left">
          <div className="page-title">Клиенты <em>сайта</em></div>
          <div className="page-desc">{loading ? '...' : `${customers.length} зарегистрированных пользователей`}</div>
        </div>
        <div className="topbar-right">
          <input className="form-input" placeholder="Поиск..."
            value={search} onChange={e=>setSearch(e.target.value)}
            style={{maxWidth:260,width:'100%',height:32,fontSize:13}} />
        </div>
      </div>

      {loading ? <div className="loading-center"><span className="spin"/> Загрузка...</div> : filtered.length===0 ? (
        <div className="card" style={{textAlign:'center',padding:40,color:'var(--t3)'}}>
          {search ? 'Ничего не найдено' : 'Нет зарегистрированных клиентов'}

      ) : (
        <div className="card">
          <div className="tbl-wrap"><table className="tbl">
            <thead><tr><th>ID</th><th>Имя</th><th>Email</th><th>Telegram</th><th>Баланс</th><th>Статус</th><th>Регистрация</th><th>Посл. вход</th><th></th></tr></thead>
            <tbody>{filtered.map(c => (
              <tr key={c.id} style={{cursor:'pointer'}} onClick={()=>openDetail(c)}>
                <td style={{fontFamily:'var(--mono)',fontSize:12}}>#{c.id}</td>
                <td>{c.name||'—'}</td>
                <td style={{fontFamily:'var(--mono)',fontSize:12}}>{c.email||'—'} {c.email_verified?<span style={{color:'var(--gr)',fontSize:10}}>✓</span>:''}</td>
                <td style={{fontSize:12}}>{c.telegram_username?`@${c.telegram_username}`:'—'}</td>
                <td style={{fontWeight:600}}>{(c.balance||0).toFixed(2)} ₽</td>
                <td><span className={`badge ${STATUS_BADGE[c.status]||''}`}>{c.status==='active'?'Активен':'Бан'}</span></td>
                <td style={{fontSize:12}}>{new Date(c.created_at).toLocaleDateString('ru')}</td>
                <td style={{fontSize:12}}>{c.last_login_at?new Date(c.last_login_at).toLocaleDateString('ru'):'—'}</td>
                <td>
                  <div style={{display:'flex',gap:6}}>
                    <button className="btn btn-ghost btn-sm" onClick={e=>{e.stopPropagation();toggleStatus(c);}}
                      style={c.status==='active'?{color:'var(--re)'}:{color:'var(--gr)'}}>
                      {c.status==='active'?'Бан':'Разбан'}
                    </button>
                  </div>
                </td>
              </tr>
            ))}</tbody>
          </table></div>
        </div>
      )}
    </div>
  );
}

/* ── Database Manager ──────────────────────────────────── */
function DatabaseManager() {
  const [stats, setStats] = useState(null);
  const [loading, setLoading] = useState(true);
  const [optimizing, setOptimizing] = useState(false);
  const [cleaning, setCleaning] = useState(false);
  const [result, setResult] = useState(null);
  const toasts = useToast();

  const loadStats = async () => {
    try {
      const data = await api('GET', '/api/db/stats');
      setStats(data);
    } catch(e) { toasts.error(e.message); }
    finally { setLoading(false); }
  };

  useEffect(() => { loadStats(); }, []);

  const handleOptimize = async () => {
    setOptimizing(true); setResult(null);
    try {
      const data = await api('POST', '/api/db/optimize');
      setResult(data);
      toasts.ok('База данных оптимизирована');
      loadStats();
    } catch(e) { toasts.error(e.message); }
    finally { setOptimizing(false); }
  };

  const handleCleanup = async () => {
    setCleaning(true); setResult(null);
    try {
      const data = await api('POST', '/api/db/cleanup');
      setResult(data);
      toasts.ok('Очистка завершена');
      loadStats();
    } catch(e) { toasts.error(e.message); }
    finally { setCleaning(false); }
  };

  const fmtSize = (bytes) => {
    if (bytes < 1024) return bytes + ' Б';
    if (bytes < 1048576) return (bytes/1024).toFixed(1) + ' КБ';
    return (bytes/1048576).toFixed(2) + ' МБ';
  };

  if (loading) return <div className="section-card" style={{textAlign:'center',padding:40}}>Загрузка...</div>;

  return (
    <div>
      <div className="section-header"><I.Database/> База данных</div>

      {/* DB Size */}
      {stats && (
        <div className="section-card" style={{marginBottom:16}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
            <div>
              <div style={{fontSize:14,fontWeight:600}}>Размер базы данных</div>
              <div style={{fontSize:28,fontWeight:800,color:'var(--primary)',marginTop:4}}>{fmtSize(stats.size_bytes)}</div>
            </div>
            <div style={{fontSize:12,color:'var(--t3)'}}>SQLite</div>
          </div>

          <div style={{fontSize:13,fontWeight:600,marginBottom:8}}>Таблицы</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(180px,1fr))',gap:8}}>
            {stats.tables.map(t => (
              <div key={t.name} style={{background:'var(--bg2)',borderRadius:8,padding:'10px 14px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontSize:12,color:'var(--t2)'}}>{t.name}</span>
                <span style={{fontSize:13,fontWeight:700}}>{t.count}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Actions */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16}}>
        <div className="section-card">
          <div style={{fontSize:14,fontWeight:600,marginBottom:8}}>Оптимизация</div>
          <p style={{fontSize:12,color:'var(--t3)',marginBottom:12}}>
            Выполняет VACUUM и ANALYZE для оптимизации размера и производительности. Также проверяет целостность базы.
          </p>
          <button className="btn btn-primary" onClick={handleOptimize} disabled={optimizing} style={{width:'100%'}}>
            {optimizing ? <>⏳ Оптимизация...</> : <><I.RefreshCw/> Оптимизировать</>}
          </button>
        </div>

        <div className="section-card">
          <div style={{fontSize:14,fontWeight:600,marginBottom:8}}>Очистка</div>
          <p style={{fontSize:12,color:'var(--t3)',marginBottom:12}}>
            Удаляет истёкшие сессии, историю подключений старше 30 дней и устаревшие данные.
          </p>
          <button className="btn btn-warning" onClick={handleCleanup} disabled={cleaning} style={{width:'100%'}}>
            {cleaning ? <>⏳ Очистка...</> : <><I.Trash/> Очистить</>}
          </button>
        </div>
      </div>

      {/* Result */}
      {result && (
        <div className="section-card" style={{background:'var(--bg2)'}}>
          <div style={{fontSize:13,fontWeight:600,marginBottom:8}}>Результат</div>
          <pre style={{fontSize:11,color:'var(--t2)',whiteSpace:'pre-wrap',margin:0,fontFamily:'monospace'}}>
            {JSON.stringify(result, null, 2)}
          </pre>
        </div>
      )}
    </div>
  );
}

/* ── Announcements Manager ─────────────────────────────── */
function AnnouncementsManager() {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  const [editing, setEditing] = useState(null); // null | 'new' | announcement object
  const [form, setForm] = useState({ title: '', message: '', type: 'info' });
  const [saving, setSaving] = useState(false);
  const toasts = useToast();

  const load = async () => {
    try {
      const data = await api('GET', '/api/announcements');
      setItems(data);
    } catch(e) { toasts.error(e.message); }
    finally { setLoading(false); }
  };

  useEffect(() => { load(); }, []);

  const handleNew = () => {
    setForm({ title: '', message: '', type: 'info' });
    setEditing('new');
  };

  const handleEdit = (a) => {
    setForm({ title: a.title, message: a.message, type: a.type });
    setEditing(a);
  };

  const handleSave = async () => {
    if (!form.title.trim() || !form.message.trim()) { toasts.error('Заполните все поля'); return; }
    setSaving(true);
    try {
      if (editing === 'new') {
        await api('POST', '/api/announcements', form);
        toasts.ok('Уведомление создано');
      } else {
        await api('PUT', `/api/announcements/${editing.id}`, form);
        toasts.ok('Уведомление обновлено');
      }
      setEditing(null);
      load();
    } catch(e) { toasts.error(e.message); }
    finally { setSaving(false); }
  };

  const handleToggle = async (a) => {
    try {
      await api('PUT', `/api/announcements/${a.id}`, { title: a.title, message: a.message, type: a.type, is_active: a.is_active ? 0 : 1 });
      load();
    } catch(e) { toasts.error(e.message); }
  };

  const handleDelete = async (a) => {
    if (!confirm('Удалить уведомление?')) return;
    try {
      await api('DELETE', `/api/announcements/${a.id}`);
      toasts.ok('Удалено');
      load();
    } catch(e) { toasts.error(e.message); }
  };

  const typeLabels = { info: '💡 Инфо', warning: '⚠️ Важно', success: '✅ Успех', danger: '🔴 Срочно' };
  const typeBadges = { info: 'badge', warning: 'badge badge-accent', success: 'badge', danger: 'badge badge-accent' };
  const typeColors = { info: '#6366f1', warning: '#f59e0b', success: '#22c55e', danger: '#ef4444' };

  if (loading) return <div className="section-card" style={{textAlign:'center',padding:40}}>Загрузка...</div>;

  return (
    <div>
      <div className="section-header" style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span><I.Bell/> Уведомления для клиентов</span>
        <button className="btn btn-primary btn-sm" onClick={handleNew}><I.Plus/> Создать</button>
      </div>

      {/* Edit Form */}
      {editing && (
        <div className="section-card" style={{marginBottom:16,border:'1px solid var(--primary)',borderRadius:12}}>
          <div style={{fontSize:14,fontWeight:600,marginBottom:12}}>
            {editing === 'new' ? 'Новое уведомление' : 'Редактирование'}
          </div>
          <div style={{display:'grid',gap:10}}>
            <input className="input" placeholder="Заголовок" value={form.title}
              onChange={e => setForm({...form, title: e.target.value})} />
            <textarea className="input" placeholder="Сообщение" rows={3} value={form.message}
              onChange={e => setForm({...form, message: e.target.value})} style={{resize:'vertical'}} />
            <div style={{display:'flex',gap:8}}>
              {Object.entries(typeLabels).map(([k,v]) => (
                <button key={k} className={`btn btn-sm ${form.type===k ? 'btn-primary' : 'btn-ghost'}`}
                  onClick={() => setForm({...form, type: k})} style={form.type===k ? {background:typeColors[k]} : {}}>
                  {v}
                </button>
              ))}
            </div>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
              <button className="btn btn-ghost btn-sm" onClick={() => setEditing(null)}>Отмена</button>
              <button className="btn btn-primary btn-sm" onClick={handleSave} disabled={saving}>
                {saving ? 'Сохранение...' : <><I.Save/> Сохранить</>}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* List */}
      {items.length === 0 ? (
        <div className="section-card" style={{textAlign:'center',padding:30,color:'var(--t3)'}}>
          Нет уведомлений. Создайте первое уведомление для клиентов.
        </div>
      ) : (
        <div style={{display:'grid',gap:8}}>
          {items.map(a => (
            <div key={a.id} className="section-card" style={{display:'flex',alignItems:'center',gap:12,opacity: a.is_active ? 1 : 0.5}}>
              <div style={{width:4,height:40,borderRadius:4,background:typeColors[a.type]||typeColors.info,flexShrink:0}} />
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:2}}>
                  <span style={{fontSize:13,fontWeight:600}}>{a.title}</span>
                  <span style={{fontSize:10,padding:'1px 6px',borderRadius:6,background:typeColors[a.type]+'22',color:typeColors[a.type]}}>
                    {typeLabels[a.type]||a.type}
                  </span>
                  {!a.is_active && <span style={{fontSize:10,padding:'1px 6px',borderRadius:6,background:'var(--bg2)',color:'var(--t3)'}}>Скрыто</span>}
                </div>
                <div style={{fontSize:12,color:'var(--t3)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.message}</div>
              </div>
              <div style={{display:'flex',gap:4,flexShrink:0}}>
                <button className="btn btn-ghost btn-sm" onClick={() => handleToggle(a)} title={a.is_active ? 'Скрыть' : 'Показать'}>
                  {a.is_active ? <I.ToggleRight/> : <I.ToggleLeft/>}
                </button>
                <button className="btn btn-ghost btn-sm" onClick={() => handleEdit(a)}><I.Edit/></button>
                <button className="btn btn-ghost btn-sm" onClick={() => handleDelete(a)} style={{color:'var(--danger)'}}><I.Trash/></button>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ── App ────────────────────────────────────────────────── */
function App() {
  const [authed, setAuthed] = useState(!!getToken());
  const [role, setRole] = useState(getAdminRole());
  const [page, setPage] = useState('dashboard');
  const [nodes, setNodes] = useState([]);
  const [selNode, setSelNode] = useState(null);      // for users page
  const [selNodeView, setSelNodeView] = useState(null); // for node detail page
  const [panelVersion, setPanelVersion] = useState(null);
  const toasts = useToast();

  const loadNodes = useCallback(async () => {
    try { const n = await api('GET','/api/nodes'); setNodes(n||[]); } catch {}
  }, []);

  const loadCounts = useCallback(async (list) => {
    try {
      const wc = await Promise.all(list.map(async n => {
        try { const u = await api('GET',`/api/nodes/${n.id}/users`); return {...n,_userCount:u.length}; }
        catch { return {...n,_userCount:0}; }
      }));
      setNodes(wc);
    } catch {}
  }, []);

  useEffect(() => {
    api('GET', '/api/version')
      .then(r => setPanelVersion(r.version ? (r.version.startsWith('v') ? r.version : `v${r.version}`) : null))
      .catch(() => {});
  }, []);

  // Fetch actual role from server on mount
  useEffect(() => {
    if (authed) {
      api('GET','/api/admin/role').then(r => { setRole(r.role); setAdminRole(r.role); }).catch(()=>{});
    }
  }, [authed]);

  useEffect(()=>{ if(authed) loadNodes(); },[authed]);
  useEffect(()=>{ if(nodes.length&&!nodes[0]._userCount) loadCounts(nodes); },[nodes]);

  const nav = (p) => { setPage(p); setSelNode(null); setSelNodeView(null); };
  const selectNode = (n) => { setSelNode(n); setPage('users'); };
  const openNodeView = (n) => { setSelNodeView(n); setPage('node'); };

  // Role-based nav: admin=all, moderator=no settings, support=dashboard+customers only
  const NAV_ALL = [
    { id:'dashboard',  icon:<I.LayoutDash/>, label:'Дашборд',    roles:['admin','moderator','support'] },
    { id:'nodes',      icon:<I.Server/>,     label:'Ноды',       roles:['admin','moderator'] },
    { id:'users',      icon:<I.Network/>,    label:'Прокси',     roles:['admin','moderator'] },
    { id:'customers',  icon:<I.UserCog/>,    label:'Клиенты',    roles:['admin','moderator','support'] },
    { id:'plans',      icon:<I.Tag/>,        label:'Тарифы',     roles:['admin','moderator'] },
    { id:'database',   icon:<I.Database/>,   label:'БД',         mobileLabel:'БД',          roles:['admin'] },
    { id:'announcements',icon:<I.Bell/>,     label:'Уведомления',mobileLabel:'Увед.',       roles:['admin'] },
    { id:'settings',   icon:<I.Settings/>,   label:'Настройки',  mobileLabel:'Настр.',      roles:['admin'] },
  ];
  const NAV = NAV_ALL.filter(n => n.roles.includes(role));

  if(!authed) return <><Login onLogin={(t,r)=>{setToken(t);setAdminRole(r||'admin');setRole(r||'admin');setAuthed(true);}}/><Toasts list={toasts}/></>;

  return (
    <div className="app">
      <aside className="sidebar" id="sidebar">
        <div className="sidebar-logo">
          <div className="logo-icon"><I.Zap/></div>
          <div className="logo-texts">
            <div className="logo-name">ST VILLAGE Panel</div>
            <div className="logo-sub">{panelVersion || 'adminpanel'}</div>
          </div>
        </div>

        <nav className="nav">
          <div className="nav-section">Навигация</div>
          {NAV.map(item => (
            <div key={item.id} className={`nav-item ${(page===item.id||(page==='node'&&item.id==='nodes'))?'active':''}`} onClick={()=>nav(item.id)}>
              {item.icon}{item.label}
            </div>
          ))}
        </nav>

        <VersionBlock nodes={nodes} panelVersion={panelVersion}/>

        <div className="sidebar-footer">
          {role!=='admin' && <div style={{padding:'6px 10px',fontSize:11,color:'var(--t3)',textAlign:'center'}}>
            Роль: <span className="badge" style={{fontSize:10}}>{role==='moderator'?'Модератор':'Саппорт'}</span>
          </div>}
          <button className="btn btn-ghost btn-sm" style={{width:'100%',justifyContent:'center',marginTop:8}}
            onClick={()=>{setToken('');setAdminRole('admin');setAuthed(false);}}>
            <I.LogOut/> Выйти
          </button>
        </div>
      </aside>

      <main className="main">
        {page==='dashboard' && <Dashboard nodes={nodes} onSelectNode={openNodeView} onManageNode={selectNode}/>}
        {page==='nodes'     && <NodesPage nodes={nodes} onReload={loadNodes} onManage={selectNode} onOpenNode={openNodeView}/>}
        {page==='node'      && selNodeView && <NodePage node={selNodeView} onBack={()=>{setPage('nodes');setSelNodeView(null);}} onManage={selectNode} onReload={loadNodes}/>}
        {page==='users' && !selNode && <AllUsers nodes={nodes} onSelectNode={selectNode}/>}
        {page==='users' && selNode  && <UsersPage node={selNode} onBack={()=>{setSelNode(null);setPage('users');}}/>}
        {page==='customers' && <CustomersManager/>}
        {page==='plans'     && <PlansManager/>}
        {page==='database'  && <DatabaseManager/>}
        {page==='announcements' && <AnnouncementsManager/>}
        {page==='settings'  && <><Settings/><TeamManager/></>}
      </main>

      <nav className="mobile-bar">
        {NAV.map(item => (
          <div key={item.id} className={`mob-item ${page===item.id?'active':''}`} onClick={()=>nav(item.id)}>
            {item.icon}<span className="mob-label">{item.mobileLabel||item.label}</span>
          </div>
        ))}
      </nav>

      <Toasts list={toasts}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
