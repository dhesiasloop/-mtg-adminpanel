<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ST VILLAGE AdminPanel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" defer></script>
<style>
:root {
  /* Base */
  --bg:    #080a12;
  --bg2:   #0d0f1c;
  --bg3:   #111322;
  --card:  #141728;
  --card2: #181b2e;
  --b1:    rgba(255,255,255,0.06);
  --b2:    rgba(255,255,255,0.1);
  --b3:    rgba(255,255,255,0.16);
  /* Brand */
  --vi:  #7c6ff7;
  --vi2: #6055e0;
  --cy:  #38bdf8;
  --gr:  #34d399;
  --re:  #fb7185;
  --am:  #fbbf24;
  --grad: linear-gradient(135deg, #7c6ff7 0%, #38bdf8 100%);
  --glow: 0 0 40px rgba(124,111,247,0.25);
  /* Text */
  --t1: #f1f1f8;
  --t2: #6e7490;
  --t3: #373d5a;
  /* Fonts */
  --sans: 'Geist', -apple-system, sans-serif;
  --mono: 'Geist Mono', 'JetBrains Mono', monospace;
  /* Motion */
  --ease: cubic-bezier(0.22, 1, 0.36, 1);
  --tx: 0.2s var(--ease);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body {
  background: var(--bg);
  color: var(--t1);
  font-family: var(--sans);
  font-size: 15px;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ─── SCROLLBAR ─────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--b2); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--b3); }

/* ─── LAYOUT ────────────────────────────────────────────── */
.app { display: flex; min-height: 100vh; }

/* ─── SIDEBAR ───────────────────────────────────────────── */
.sidebar {
  width: 240px;
  background: var(--bg2);
  border-right: 1px solid var(--b1);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
  transition: transform var(--tx);
}

.sidebar-logo {
  padding: 20px 16px 16px;
  border-bottom: 1px solid var(--b1);
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo-icon {
  width: 34px; height: 34px;
  background: var(--grad);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 0 20px rgba(124,111,247,0.4);
}
.logo-icon svg { width: 18px; height: 18px; color: #fff; }
.logo-texts {}
.logo-name {
  font-size: 14px; font-weight: 600; letter-spacing: -0.2px;
  background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.logo-sub { font-size: 10px; color: var(--t3); margin-top: 1px; font-family: var(--mono); }

.nav { flex: 1; padding: 10px 8px; overflow-y: auto; }
.nav-section { font-size: 10px; font-weight: 600; color: var(--t3); letter-spacing: 1.2px; text-transform: uppercase; padding: 12px 10px 6px; }
.nav-item {
  display: flex; align-items: center; gap: 9px;
  padding: 10px 12px; border-radius: 8px;
  cursor: pointer; font-size: 14px; font-weight: 400;
  color: var(--t2); transition: all var(--tx);
  margin-bottom: 2px; user-select: none;
  position: relative; border: 1px solid transparent;
}
.nav-item svg { width: 15px; height: 15px; flex-shrink: 0; }
.nav-item:hover { background: var(--card); color: var(--t1); }
.nav-item.active {
  background: linear-gradient(135deg, rgba(124,111,247,0.15) 0%, rgba(56,189,248,0.06) 100%);
  color: var(--t1);
  border-color: rgba(124,111,247,0.2);
}
.nav-item.active::before {
  content: '';
  position: absolute; left: -1px; top: 25%; bottom: 25%;
  width: 3px; border-radius: 0 3px 3px 0;
  background: var(--grad);
}
.nav-badge {
  margin-left: auto;
  background: var(--b1); color: var(--t2);
  font-size: 10px; font-weight: 600;
  padding: 1px 7px; border-radius: 10px;
  font-family: var(--mono);
}
.nav-item.active .nav-badge { background: rgba(124,111,247,0.2); color: var(--vi); }

/* VERSION BLOCK */
/* version sidebar btn */
.version-sidebar-btn {
  margin: 0 8px 8px;
  width: calc(100% - 16px);
  padding: 9px 12px; border-radius: 9px;
  background: var(--card); border: 1px solid var(--b2);
  color: var(--t2); cursor: pointer;
  font-size: 12px; font-weight: 500; font-family: var(--sans);
  display: flex; align-items: center; gap: 8px;
  transition: all var(--tx);
}
.version-sidebar-btn:hover { background: var(--card2); color: var(--t1); border-color: var(--b3); }
.version-sidebar-btn svg { width: 13px; height: 13px; flex-shrink: 0; }
.version-sidebar-tag {
  margin-left: auto;
  font-size: 10px; font-weight: 600; font-family: var(--mono);
  padding: 1px 6px; border-radius: 5px;
}
.version-sidebar-tag.ok   { background: rgba(52,211,153,0.12); color: var(--gr); }
.version-sidebar-tag.warn { background: rgba(251,191,36,0.12);  color: var(--am); }
.version-sidebar-tag.load { background: var(--b1); color: var(--t3); }

/* version modal table */
.ver-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 4px; }
.ver-table th { text-align: left; padding: 8px 12px; font-size: 11px; font-weight: 500; color: var(--t3); text-transform: uppercase; letter-spacing: .7px; border-bottom: 1px solid var(--b1); }
.ver-table td { padding: 11px 12px; border-bottom: 1px solid var(--b1); vertical-align: middle; }
.ver-table tr:last-child td { border-bottom: none; }
.ver-table tbody tr:hover td { background: rgba(124,111,247,0.04); }

/* node status badge checked via SSH every 20s */

/* node info tooltip */
.node-info-row {
  margin-top: 10px; padding-top: 10px;
  border-top: 1px solid var(--b1);
  font-size: 11px; color: var(--t3); font-family: var(--mono);
  line-height: 1.8;
  animation: pg-in .15s var(--ease);
}

.sidebar-footer {
  padding: 12px;
  border-top: 1px solid var(--b1);
}
.sidebar-footer-row {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px;
}
.sidebar-stat { font-size: 11px; color: var(--t3); }
.sidebar-stat span { color: var(--t2); font-weight: 500; }

/* ─── MAIN ──────────────────────────────────────────────── */
.main {
  margin-left: 240px; flex: 1;
  padding: 28px 32px;
  max-width: calc(100vw - 240px);
  min-height: 100vh;
}

/* ─── TOPBAR ────────────────────────────────────────────── */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 28px; flex-wrap: wrap; gap: 12px;
}
.topbar-left {}
.page-title {
  font-size: 22px; font-weight: 600; letter-spacing: -0.5px;
}
.page-title em {
  font-style: normal;
  background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.page-desc { font-size: 13px; color: var(--t3); margin-top: 3px; font-family: var(--mono); }
.topbar-right { display: flex; align-items: center; gap: 8px; }

/* ─── BUTTONS ───────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 9px 18px; border-radius: 9px; border: none;
  cursor: pointer; font-size: 14px; font-weight: 500;
  transition: all var(--tx); font-family: var(--sans);
  white-space: nowrap; line-height: 1;
}
.btn svg { width: 15px; height: 15px; flex-shrink: 0; }
.btn-primary {
  background: var(--grad); color: #fff;
  box-shadow: 0 0 20px rgba(124,111,247,0.3);
}
.btn-primary:hover { opacity: 0.87; transform: translateY(-1px); box-shadow: 0 0 32px rgba(124,111,247,0.45); }
.btn-secondary {
  background: var(--card2); color: var(--t1);
  border: 1px solid var(--b2);
}
.btn-secondary:hover { background: var(--card); border-color: var(--b3); }
.btn-ghost { background: transparent; color: var(--t2); border: 1px solid var(--b2); }
.btn-ghost:hover { background: var(--card); color: var(--t1); }
.btn-danger { background: transparent; color: var(--re); border: 1px solid rgba(251,113,133,0.2); }
.btn-danger:hover { background: rgba(251,113,133,0.08); border-color: rgba(251,113,133,0.4); }
.btn-sm { padding: 6px 13px; font-size: 13px; border-radius: 7px; }
.btn-sm svg { width: 13px; height: 13px; }
.btn-icon { padding: 7px; width: 34px; height: 34px; justify-content: center; }
.btn-icon svg { width: 16px; height: 16px; }
.btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none !important; }

/* ─── STAT CARDS ────────────────────────────────────────── */
.stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 28px; }
.stat-card {
  background: var(--card);
  border: 1px solid var(--b1);
  border-radius: 12px; padding: 18px 20px;
  position: relative; overflow: hidden;
  transition: border-color var(--tx), transform var(--tx);
  cursor: default;
}
.stat-card:hover { border-color: var(--b2); transform: translateY(-2px); }
.stat-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; }
.stat-icon {
  width: 36px; height: 36px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
}
.stat-icon svg { width: 17px; height: 17px; }
.stat-icon.vi { background: rgba(124,111,247,0.12); color: var(--vi); border: 1px solid rgba(124,111,247,0.2); }
.stat-icon.gr { background: rgba(52,211,153,0.12); color: var(--gr); border: 1px solid rgba(52,211,153,0.2); }
.stat-icon.cy { background: rgba(56,189,248,0.12); color: var(--cy); border: 1px solid rgba(56,189,248,0.2); }
.stat-icon.am { background: rgba(251,191,36,0.12); color: var(--am); border: 1px solid rgba(251,191,36,0.2); }
.stat-trend { font-size: 11px; font-weight: 500; }
.stat-trend.up { color: var(--gr); }
.stat-val { font-size: 32px; font-weight: 700; font-family: var(--mono); letter-spacing: -1.5px; line-height: 1; margin-bottom: 4px; }
.stat-val.vi { background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.stat-val.gr { color: var(--gr); }
.stat-val.cy { color: var(--cy); }
.stat-val.am { color: var(--am); }
.stat-lbl { font-size: 12px; color: var(--t3); font-weight: 400; }

/* ─── CARDS ─────────────────────────────────────────────── */
.card {
  background: var(--card);
  border: 1px solid var(--b1);
  border-radius: 12px; padding: 20px;
}
.card-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--b1);
}
.card-title { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.card-title svg { width: 15px; height: 15px; color: var(--t3); }

/* ─── SECTION (DB, Announcements) ───────────────────────── */
.section-header {
  font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 10px;
  margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--b1);
}
.section-header svg { width: 20px; height: 20px; flex-shrink: 0; color: var(--primary); }
.section-card {
  background: var(--card); border: 1px solid var(--b1);
  border-radius: 12px; padding: 20px;
}

.grid-2 { display: grid; grid-template-columns: repeat(2,1fr); gap: 14px; }

/* ─── NODE CARD ─────────────────────────────────────────── */
.node-card {
  background: var(--card);
  border: 1px solid var(--b1);
  border-radius: 12px; padding: 20px;
  cursor: pointer;
  transition: border-color var(--tx), transform var(--tx), box-shadow var(--tx);
  position: relative; overflow: hidden;
}
.node-card::after {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: var(--grad); opacity: 0;
  transition: opacity var(--tx);
}
.node-card:hover { border-color: rgba(124,111,247,0.3); transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,0.3); }
.node-card:hover::after { opacity: 1; }
.node-head { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; }
.node-icon {
  width: 40px; height: 40px; border-radius: 10px;
  background: linear-gradient(135deg, rgba(124,111,247,0.15), rgba(56,189,248,0.08));
  border: 1px solid rgba(124,111,247,0.2);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.node-icon svg { width: 18px; height: 18px; color: var(--vi); }
.node-info { margin-left: 12px; flex: 1; }
.node-name { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; }
.node-host { font-size: 11px; color: var(--t3); font-family: var(--mono); margin-top: 2px; }
.node-stats { display: flex; gap: 20px; margin-bottom: 16px; }
.node-stat-lbl { font-size: 10px; color: var(--t3); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 3px; }
.node-stat-val { font-size: 24px; font-weight: 700; font-family: var(--mono); letter-spacing: -1px; background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.node-actions { display: flex; gap: 7px; flex-wrap: wrap; }

/* ─── TABLE ─────────────────────────────────────────────── */
.tbl-wrap, .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
th {
  text-align: left; padding: 11px 14px;
  color: var(--t3); font-weight: 500;
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.7px;
  border-bottom: 1px solid var(--b1);
  white-space: nowrap; background: var(--card);
  position: sticky; top: 0; z-index: 1;
}
td {
  padding: 12px 14px; border-bottom: 1px solid var(--b1);
  vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tr { transition: background var(--tx); }
tbody tr:hover td { background: rgba(124,111,247,0.04); }

/* ─── BADGES ────────────────────────────────────────────── */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 6px;
  font-size: 11px; font-weight: 500;
  font-family: var(--mono); white-space: nowrap;
}
.badge-green { background: rgba(52,211,153,0.1); color: var(--gr); border: 1px solid rgba(52,211,153,0.18); }
.badge-red   { background: rgba(251,113,133,0.1); color: var(--re); border: 1px solid rgba(251,113,133,0.18); }
.badge-amber { background: rgba(251,191,36,0.1); color: var(--am); border: 1px solid rgba(251,191,36,0.18); }
.badge-blue  { background: rgba(56,189,248,0.1);  color: var(--cy); border: 1px solid rgba(56,189,248,0.18); }
.badge-purple{ background: rgba(124,111,247,0.1); color: var(--vi); border: 1px solid rgba(124,111,247,0.18); }
.badge-violet{ background: rgba(167,139,250,0.1); color: #a78bfa; border: 1px solid rgba(167,139,250,0.18); }
.dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
.dot-live { animation: dot-pulse 2.4s ease infinite; }
@keyframes dot-pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }

/* ─── INPUTS ────────────────────────────────────────────── */
.form-group { margin-bottom: 14px; }
.form-label { display: block; font-size: 12px; color: var(--t2); margin-bottom: 5px; font-weight: 500; }
.form-input {
  width: 100%; padding: 8px 11px;
  background: var(--bg3);
  border: 1px solid var(--b2);
  border-radius: 8px; color: var(--t1);
  font-size: 13px; font-family: var(--sans); outline: none;
  transition: border-color var(--tx), box-shadow var(--tx);
}
.form-input:focus {
  border-color: var(--vi);
  box-shadow: 0 0 0 3px rgba(124,111,247,0.15);
}
.form-input::placeholder { color: var(--t3); }
.radio-group { display: flex; gap: 6px; }
.radio-btn {
  flex: 1; padding: 7px; border-radius: 7px; text-align: center;
  font-size: 12px; font-weight: 500; cursor: pointer;
  border: 1px solid var(--b2); color: var(--t2);
  background: var(--bg3); transition: all var(--tx);
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.radio-btn svg { width: 12px; height: 12px; }
.radio-btn.on { background: rgba(124,111,247,0.12); color: var(--t1); border-color: rgba(124,111,247,0.3); }

/* ─── MODAL ─────────────────────────────────────────────── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(8px);
  z-index: 1000; display: flex;
  align-items: center; justify-content: center;
  animation: ov-in .15s ease;
}
@keyframes ov-in { from{opacity:0} to{opacity:1} }
.modal {
  background: var(--bg2);
  border: 1px solid var(--b2);
  border-radius: 16px; padding: 0;
  width: 100%; max-width: 480px;
  max-height: 90vh; overflow-y: auto;
  animation: modal-in .22s var(--ease);
  box-shadow: 0 32px 80px rgba(0,0,0,0.6);
}
@keyframes modal-in { from{opacity:0;transform:scale(.95) translateY(10px)} to{opacity:1;transform:none} }
.modal-head {
  padding: 20px 22px 18px;
  border-bottom: 1px solid var(--b1);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-title { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.modal-title svg { width: 15px; height: 15px; color: var(--vi); }
.modal-close { cursor: pointer; color: var(--t3); transition: color var(--tx); background: none; border: none; padding: 4px; }
.modal-close:hover { color: var(--t1); }
.modal-close svg { width: 16px; height: 16px; }
.modal-body { padding: 20px 22px; }
.modal-foot { padding: 16px 22px; border-top: 1px solid var(--b1); display: flex; gap: 8px; justify-content: flex-end; }

/* ─── LINK BOX ──────────────────────────────────────────── */
.link-box {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg3); border: 1px solid var(--b1);
  border-radius: 7px; padding: 6px 10px;
  font-family: var(--mono); font-size: 11px; color: var(--cy);
  cursor: pointer; transition: all var(--tx); max-width: 280px;
}
.link-box:hover { border-color: var(--vi); background: var(--card); }
.link-box svg { width: 11px; height: 11px; flex-shrink: 0; }
.link-txt { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }

/* ─── TOAST ─────────────────────────────────────────────── */
.toasts { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
.toast {
  display: flex; align-items: flex-start; gap: 10px;
  background: var(--card2); border: 1px solid var(--b2);
  border-radius: 10px; padding: 12px 14px;
  font-size: 13px; min-width: 240px; max-width: 340px;
  animation: toast-in .25s var(--ease);
  box-shadow: 0 12px 40px rgba(0,0,0,0.5);
}
.toast svg { width: 15px; height: 15px; flex-shrink: 0; margin-top: 1px; }
.toast.success { border-left: 3px solid var(--gr); }
.toast.success svg { color: var(--gr); }
.toast.error   { border-left: 3px solid var(--re); }
.toast.error svg { color: var(--re); }
.toast.info    { border-left: 3px solid var(--vi); }
.toast.info svg { color: var(--vi); }
@keyframes toast-in { from{transform:translateX(32px) scale(.95);opacity:0} to{transform:none;opacity:1} }

/* ─── SPINNER ───────────────────────────────────────────── */
.spin {
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,0.1);
  border-top-color: var(--cy);
  border-radius: 50%;
  animation: spinning .5s linear infinite;
  display: inline-block; flex-shrink: 0;
}
.spin-sm { width: 12px; height: 12px; }
@keyframes spinning { to{transform:rotate(360deg)} }
.loading-center { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 48px; color: var(--t2); font-size: 13px; }

/* ─── REFRESHING ────────────────────────────────────────── */
.refreshing { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; color: var(--t3); }
.refreshing .spin { width: 11px; height: 11px; }

/* ─── EMPTY ─────────────────────────────────────────────── */
.empty { text-align: center; padding: 56px 24px; color: var(--t3); }
.empty-icon { margin-bottom: 16px; display: flex; justify-content: center; }
.empty-icon svg { width: 40px; height: 40px; color: var(--t3); opacity: .4; }
.empty-title { font-size: 14px; font-weight: 500; color: var(--t2); margin-bottom: 6px; }
.empty-desc { font-size: 13px; }

/* ─── TRAFFIC ───────────────────────────────────────────── */
.traf { font-family: var(--mono); font-size: 11px; display: inline-flex; align-items: center; gap: 6px; }
.traf .rx { color: var(--gr); }
.traf .tx { color: var(--re); }

/* ─── ACTIONS ROW ───────────────────────────────────────── */
.acts { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }

/* ─── PAGE ENTER ────────────────────────────────────────── */
.pg { animation: pg-in .22s var(--ease); }
@keyframes pg-in { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }

/* ─── SECTION LABEL ─────────────────────────────────────── */
.sec-lbl {
  font-size: 11px; font-weight: 600; color: var(--t3);
  text-transform: uppercase; letter-spacing: 1.2px;
  margin: 22px 0 14px;
  display: flex; align-items: center; gap: 10px;
}
.sec-lbl::after { content: ''; flex: 1; height: 1px; background: var(--b1); }

/* ─── DIVIDER ───────────────────────────────────────────── */
.divider { height: 1px; background: var(--b1); margin: 16px 0; }

/* ─── LOGIN ─────────────────────────────────────────────── */
.login-wrap {
  min-height: 100vh; display: flex;
  align-items: center; justify-content: center;
  padding: 20px;
  background: var(--bg);
  background-image:
    radial-gradient(ellipse 60% 50% at 50% 0%, rgba(124,111,247,0.1) 0%, transparent 70%),
    radial-gradient(ellipse 40% 30% at 80% 80%, rgba(56,189,248,0.05) 0%, transparent 60%);
}
.login-card {
  width: 100%; max-width: 400px;
  background: var(--bg2);
  border: 1px solid var(--b2);
  border-radius: 20px; overflow: hidden;
  box-shadow: 0 32px 80px rgba(0,0,0,0.5);
  animation: modal-in .3s var(--ease);
}
.login-head {
  padding: 32px 28px 24px;
  text-align: center;
  border-bottom: 1px solid var(--b1);
}
.login-icon {
  width: 60px; height: 60px;
  background: var(--grad);
  border-radius: 18px;
  display: inline-flex; align-items: center; justify-content: center;
  margin-bottom: 16px;
  box-shadow: 0 0 40px rgba(124,111,247,0.4);
}
.login-icon svg { width: 28px; height: 28px; color: #fff; }
.login-title {
  font-size: 22px; font-weight: 700; letter-spacing: -0.5px;
  background: var(--grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.login-sub { font-size: 13px; color: var(--t3); margin-top: 5px; font-family: var(--mono); }
.login-body { padding: 24px 28px 28px; }
.totp-code-input {
  text-align: center; font-size: 32px; letter-spacing: 12px;
  font-family: var(--mono); font-weight: 600;
}

/* ─── MOBILE ────────────────────────────────────────────── */
@media (max-width: 860px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); box-shadow: 8px 0 40px rgba(0,0,0,0.5); }
  .main { margin-left: 0; max-width: 100vw; padding: 16px 10px 80px; overflow-x: hidden; word-break: break-word; }
  .mobile-bar { display: flex !important; }
  .stats-row { grid-template-columns: repeat(2,1fr); gap: 10px; }
  .grid-2 { grid-template-columns: 1fr; }
  .stat-val { font-size: 22px; }
  .stat-card { padding: 14px; }
  .modal { border-radius: 20px 20px 0 0; position: fixed; bottom: 0; left: 0; right: 0; max-width: 100% !important; max-height: 90vh; margin: 0; width: 100%; }
  .modal-body { max-height: 60vh; overflow-y: auto; }
  .overlay { align-items: flex-end; }
  table { font-size: 11px; display: block; overflow-x: auto; }
  thead, tbody, tr { display: table; width: 100%; table-layout: auto; }
  th, td { padding: 6px 8px; white-space: nowrap; }
  .link-box { max-width: 100%; word-break: break-all; }
  .topbar { flex-direction: column; align-items: flex-start; gap: 8px; }
  .topbar-right { width: 100%; flex-wrap: wrap; gap: 6px; }
  .topbar-right .form-input { width: 100% !important; }
  .topbar-right .btn { flex: 1; min-width: 0; justify-content: center; }
  .page-title { font-size: 18px; word-break: break-word; }
  .page-desc { font-size: 11px; word-break: break-word; }
  .card { padding: 14px; overflow: hidden; }
  .card-header { flex-direction: column; align-items: flex-start; gap: 8px; }
  .btn { font-size: 12px; padding: 7px 12px; white-space: normal; text-align: center; word-break: break-word; }
  .btn-sm { font-size: 11px; padding: 5px 10px; }
  .toasts { bottom: 80px; right: 10px; left: 10px; }
  .toast { max-width: 100%; min-width: auto; }
  .tbl-wrap, .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; max-width: 100%; }
  .node-card { padding: 14px; }
  .node-head { flex-wrap: wrap; gap: 8px; }
  .node-info { min-width: 0; }
  .node-name { font-size: 14px; word-break: break-all; }
  .node-host { word-break: break-all; }
  .node-stats { gap: 12px; flex-wrap: wrap; }
  .node-stat-val { font-size: 20px; }
  .node-actions { gap: 4px; flex-wrap: wrap; }
  .node-actions .btn { flex: 1; min-width: 60px; justify-content: center; }
  .section-header { font-size: 14px; flex-wrap: wrap; }
  .section-card { padding: 14px; overflow: hidden; }
  .form-input, .form-select, textarea { max-width: 100% !important; width: 100% !important; box-sizing: border-box; }
  .form-row { flex-direction: column; gap: 8px; }
  .ver-table td, .ver-table th { font-size: 10px; padding: 4px 6px; }
  * { -webkit-tap-highlight-color: transparent; }
}

.mobile-bar {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0;
  height: 64px;
  background: rgba(13,15,28,0.95);
  border-top: 1px solid var(--b1);
  backdrop-filter: blur(20px);
  z-index: 200; align-items: stretch;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.mob-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 2px;
  cursor: pointer; color: var(--t3);
  transition: color var(--tx); user-select: none;
  -webkit-tap-highlight-color: transparent;
  min-width: 0; padding: 4px 2px;
}
.mob-item.active { color: var(--vi); }
.mob-item svg { width: 18px; height: 18px; flex-shrink: 0; }
.mob-label { font-size: 9px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%; text-align: center; padding: 0 1px; }
.mobile-bar { overflow-x: hidden; gap: 0; }

/* ── Auth ───────────────────────────────────────────────── */
const getToken = () => localStorage.getItem('mtg_token') || '';
const setToken = (t) => localStorage.setItem('mtg_token', t);
const getAdminRole = () => localStorage.getItem('mtg_role') || 'admin';
const setAdminRole = (r) => localStorage.setItem('mtg_role', r || 'admin');
const getTotpCode = () => sessionStorage.getItem('mtg_totp') || '';
const setTotpCode = (c) => { if(c) sessionStorage.setItem('mtg_totp',c); else sessionStorage.removeItem('mtg_totp'); };

/* ── API with GET dedup ─────────────────────────────────── */
const _pend = {};
const api = async (method, path, body) => {
  const key = `${method}:${path}`;
  if (method==='GET' && _pend[key]) return _pend[key];
  const headers = { 'Content-Type':'application/json', 'x-auth-token': getToken() };
  const totp = getTotpCode(); if(totp) headers['x-totp-code'] = totp;
  const req = fetch(path, { method, headers, body: body ? JSON.stringify(body) : undefined })
    .then(async r => {
      delete _pend[key];
      if(r.status===401){ setToken(''); throw new Error('Unauthorized'); }
      if(r.status===403){ const d=await r.json().catch(()=>({})); if(d.totp) throw new Error('TOTP_REQUIRED'); throw new Error(d.error||'Forbidden'); }
      const data = await r.json();
      if(!r.ok) throw new Error(data.error||'API error');
      return data;
    }).catch(e=>{ delete _pend[key]; throw e; });
  if(method==='GET') _pend[key]=req;
  return req;
};

/* ── Toast ──────────────────────────────────────────────── */
let _toast = null;
function useToast() {
  const [toasts, setToasts] = useState([]);
  _toast = (msg, type='info') => {
    const id = Date.now();
    setToasts(t => [...t, {id, msg, type}]);
    setTimeout(() => setToasts(t => t.filter(x => x.id!==id)), 3500);
  };
  return toasts;
}
const toast = (msg, type) => _toast && _toast(msg, type);
const copyText = (txt) => navigator.clipboard.writeText(txt).then(() => toast('Скопировано!', 'success'));

function Toasts({ list }) {
  const icon = { success: <I.Check/>, error: <I.AlertCircle/>, info: <I.Info/> };
  return <div className="toasts">{list.map(t => <div key={t.id} className={`toast ${t.type}`}>{icon[t.type]}<span>{t.msg}</span></div>)}</div>;
}

  const [step, setStep] = useState('token'); // 'token' | 'totp' | 'user'
  const [totp, setTotp] = useState('');
  const [loading, setLoading] = useState(false);
  const [username, setUsername] = useState('');
  const [password, setPassword] = useState('');
  const [loginError, setLoginError] = useState('');

  const submitToken = async e => {
    e.preventDefault(); if(!tok.trim()) return;
    setLoading(true); setLoginError('');
    try {
      setToken(tok);
      const s = await fetch('/api/totp/status', { headers:{'x-auth-token':tok} }).then(r=>r.json());
      if(s.enabled) { setStep('totp'); }
      else { await api('GET','/api/nodes'); setAdminRole('admin'); toast('Вход выполнен','success'); onLogin(tok,'admin'); }
    } catch { setToken(''); toast('Неверный токен','error'); }
    finally { setLoading(false); }
  };

  const submitTotp = async e => {
    e.preventDefault(); if(totp.length!==6) return;
    setLoading(true);
    try { setTotpCode(totp); await api('GET','/api/nodes'); setAdminRole('admin'); toast('Вход выполнен','success'); onLogin(tok,'admin'); }
    catch { setTotpCode(''); setTotp(''); toast('Неверный код 2FA','error'); }
    finally { setLoading(false); }
  };

  const submitUser = async e => {
    e.preventDefault(); setLoginError('');
    if(!username.trim()||!password.trim()) return;
    setLoading(true);
    try {
      const res = await fetch('/api/admin/login', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({username, password})
      });
      const data = await res.json();
      if(!res.ok) throw new Error(data.error||'Ошибка');
      const userToken = 'user:'+username;
      setToken(userToken);
      setAdminRole(data.role);
      toast(`Вход: ${data.display_name||username} (${data.role})`,'success');
      onLogin(userToken, data.role);
    } catch(e) { setLoginError(e.message); }
    finally { setLoading(false); }
  };

  return (
    <div className="login-wrap">
      <div className="login-card">
        <div className="login-head">
          <div className="login-icon">{step==='totp'?<I.Shield/>:step==='user'?<I.Users/>:<I.Zap/>}</div>
          <div className="login-title">ST VILLAGE Panel</div>
          <div className="login-sub">{step==='totp'?'two-factor auth':step==='user'?'вход по логину':'proxy manager'}</div>
        </div>
        <div className="login-body">
          {step==='token' ? (
            <form onSubmit={submitToken}>
              <div className="form-group">
                <label className="form-label">Auth Token</label>
                <input className="form-input" type="password" placeholder="Введи токен доступа..." value={tok}
                  onChange={e=>setTok(e.target.value)} autoFocus />
              </div>
              <button className="btn btn-primary" style={{width:'100%',justifyContent:'center',padding:10}} type="submit" disabled={loading}>
                {loading ? <span className="spin spin-sm"/> : <><I.Zap/> Войти</>}
              </button>
              <div style={{textAlign:'center',marginTop:14}}>
                <button type="button" className="btn btn-ghost btn-sm" style={{fontSize:12}} onClick={()=>setStep('user')}>
                  Войти по логину и паролю
                </button>
              </div>
            </form>
          ) : step==='user' ? (
            <form onSubmit={submitUser}>
              <div className="form-group">
                <label className="form-label">Логин</label>
                <input className="form-input" type="text" placeholder="username" value={username}
                  onChange={e=>setUsername(e.target.value)} autoFocus />
              </div>
              <div className="form-group">
                <label className="form-label">Пароль</label>
                <input className="form-input" type="password" placeholder="••••••" value={password}
                  onChange={e=>setPassword(e.target.value)} />
              </div>
              {loginError && <div style={{color:'var(--re)',fontSize:13,marginBottom:12}}>{loginError}</div>}
              <button className="btn btn-primary" style={{width:'100%',justifyContent:'center',padding:10}} type="submit" disabled={loading}>
                {loading ? <span className="spin spin-sm"/> : <><I.Users/> Войти</>}
              </button>
              <div style={{textAlign:'center',marginTop:14}}>
                <button type="button" className="btn btn-ghost btn-sm" style={{fontSize:12}} onClick={()=>setStep('token')}>
                  Войти по токену
                </button>
              </div>
            </form>
          ) : (
            <form onSubmit={submitTotp}>
              <p style={{fontSize:13,color:'var(--t2)',textAlign:'center',marginBottom:18,lineHeight:1.6}}>
                Открой Google Authenticator и введи<br/>текущий 6-значный код
              </p>
              <div className="form-group">
                <input className="form-input totp-code-input" type="text" inputMode="numeric"
                  placeholder="——————" value={totp} maxLength={6}
                  onChange={e=>setTotp(e.target.value.replace(/\D/g,''))} autoFocus />
              </div>
              <div style={{display:'flex',gap:8}}>
                <button className="btn btn-ghost" style={{flex:1,justifyContent:'center'}} type="button"
                  onClick={()=>{setStep('token');setToken('');setTotp('');}}>
                  <I.ArrowLeft/> Назад
                </button>
                <button className="btn btn-primary" style={{flex:1.5,justifyContent:'center'}} type="submit"
                  disabled={loading||totp.length!==6}>
                  {loading?<span className="spin spin-sm"/>:<><I.Check/> Подтвердить</>}
                </button>
              </div>
            </form>
          )}
        </div>
      </div>
    </div>
  );
}

// Parse "mtg:2 | built 2026-02-28T14:06:37.762665Z" → { name:"mtg:2", date:"28 Feb 2026" }
function parseVer(raw) {
  if(!raw || raw === 'error' || raw === 'unknown') return { name: raw || '—', date: null };
  const m = raw.match(/^([\w:.]+)\s*\|\s*built\s+([\d-T:.Z]+)/);
  if(m) {
    const d = new Date(m[2]);
    const date = isNaN(d) ? null : d.toLocaleDateString('ru-RU', {day:'2-digit',month:'short',year:'numeric'});
    return { name: m[1], date };
  }
  return { name: raw.slice(0,20), date: null };
}

function VersionBlock({ nodes, panelVersion }) {
  const [versions, setVersions] = useState({});
  const [agentVersions, setAgentVersions] = useState({});
  const [updating, setUpdating] = useState({});
  const [updatingAgent, setUpdatingAgent] = useState({});
  const [checking, setChecking] = useState(false);
  const [open, setOpen] = useState(false);
  const [updateInfo, setUpdateInfo] = useState(null);
  const [checkingUpdates, setCheckingUpdates] = useState(false);

  const checkVersions = useCallback(async () => {
    if(!nodes.length) return;
    setChecking(true);
    await Promise.allSettled(nodes.map(async n => {
      try {
        const [mtg, agent] = await Promise.allSettled([
          api('GET', `/api/nodes/${n.id}/mtg-version`),
          n.agent_port ? api('GET', `/api/nodes/${n.id}/agent-version`) : Promise.resolve({ version: null }),
        ]);
        setVersions(v => ({...v, [n.id]: mtg.status === 'fulfilled' ? (mtg.value.version || 'unknown') : 'error'}));
        if(n.agent_port) setAgentVersions(v => ({...v, [n.id]: agent.status === 'fulfilled' ? (agent.value.version || 'unknown') : 'error'}));
      } catch {
        setVersions(v => ({...v, [n.id]: 'error'}));
      }
    }));
    setChecking(false);
  }, [nodes]);

  const checkUpdates = useCallback(async () => {
    setCheckingUpdates(true);
    try {
      const r = await api('GET', '/api/check-updates');
      setUpdateInfo(r);
    } catch {}
    finally { setCheckingUpdates(false); }
  }, []);

  useEffect(() => { if(nodes.length) checkVersions(); }, [nodes.length]);
  useEffect(() => { if(open && !updateInfo) checkUpdates(); }, [open]);

  const updateNode = async (node) => {
    setUpdating(u => ({...u, [node.id]: true}));
    try {
      await api('POST', `/api/nodes/${node.id}/mtg-update`);
      toast(`${node.name}: MTG обновлён`, 'success');
      setTimeout(checkVersions, 3000);
    } catch(e) { toast(e.message, 'error'); }
    finally { setUpdating(u => ({...u, [node.id]: false})); }
  };

  const updateAgent = async (node) => {
    setUpdatingAgent(u => ({...u, [node.id]: true}));
    try {
      await api('POST', `/api/nodes/${node.id}/update-agent`);
      toast(`${node.name}: Агент обновлён`, 'success');
      setTimeout(checkVersions, 3000);
    } catch(e) { toast(e.message, 'error'); }
    finally { setUpdatingAgent(u => ({...u, [node.id]: false})); }
  };

  const updateAllNodes = async () => {
    for(const n of nodes) await updateNode(n);
  };

  if(!nodes.length) return null;

  const vList = Object.values(versions).map(parseVer);
  const names = [...new Set(vList.map(v => v.name).filter(v => v && v !== 'error' && v !== '—'))];
  const sidebarTag = checking ? null : names.length === 1 ? names[0] : names.length > 1 ? 'разные' : null;

          : panelHasUpdate
            ? <span className="version-sidebar-tag warn">обновление</span>

      {open && (
        <div className="overlay" onClick={e=>e.target===e.currentTarget&&setOpen(false)}>
          <div className="modal" style={{maxWidth:750}}>
            <div className="modal-head">
              <div className="modal-title"><I.Activity/> Версии и обновления</div>
              <button className="modal-close" onClick={()=>setOpen(false)}><I.X/></button>
            </div>

            <div className="modal-body" style={{padding:'16px 20px'}}>

              {/* Panel version */}

                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
                  <div style={{display:'flex',alignItems:'center',gap:10}}>
                    <div style={{width:34,height:34,borderRadius:9,background:'var(--grad)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                      <I.Zap/>
                    </div>
                    <div>
                      <div style={{fontWeight:600,fontSize:13}}>Панель управления</div>
                      <div style={{fontSize:11,color:'var(--t3)',fontFamily:'var(--mono)',marginTop:3,display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                        <span>Установлена: <span style={{color:'var(--vi)'}}>{panelVersion || '...'}</span></span>
                        {checkingUpdates
                          ? <span style={{color:'var(--t3)',display:'inline-flex',alignItems:'center',gap:4}}><span className="spin spin-sm" style={{width:9,height:9}}/> проверяю...</span>
                          : updateInfo?.panel

                        <I.Download/> {updateInfo.panel.latest}

                      className="btn btn-ghost btn-sm" style={{textDecoration:'none'}}>

                  <div>
                    <div style={{fontWeight:600,fontSize:13}}>MTG Агент</div>

function Dashboard({ nodes, onSelectNode, onManageNode }) {
  const [status, setStatus] = useState([]);
  const [loading, setLoading] = useState(true);
  const [refreshing, setRefreshing] = useState(false);

  const load = useCallback(async (silent=false) => {
    if(silent) setRefreshing(true); else setLoading(true);
    try { const s = await api('GET','/api/status'); setStatus(s); }
    catch {} finally { setLoading(false); setRefreshing(false); }
  }, []);

  useEffect(() => { load(); const t = setInterval(()=>load(true), 15000); return ()=>clearInterval(t); }, []);

  const totalUsers    = useMemo(() => nodes.reduce((a,n)=>a+(n._userCount||0),0), [nodes]);
  const onlineNodes   = useMemo(() => status.filter(s=>s.online).length, [status]);
  const activeProxies = useMemo(() => status.reduce((a,s)=>a+(s.containers||0),0), [status]);
  const stoppedProxies = totalUsers - activeProxies;
  const totalOnline   = useMemo(() => status.reduce((a,s)=>a+(s.online_users||0),0), [status]);

  return (
    <div className="pg">
      <div className="topbar">
        <div className="topbar-left">
          <div className="page-title">Панель <em>управления</em></div>
          <div className="page-desc">ST VILLAGE AdminPanel</div>
        </div>
        <div className="topbar-right">
          {refreshing && <span className="refreshing"><span className="spin"/></span>}
          <button className="btn btn-ghost btn-sm" onClick={()=>load()}><I.RefreshCw/> Обновить</button>
        </div>
      </div>

      {/* 2 summary cards */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:24}}>
        <div className="card" style={{padding:'20px 24px'}}>
          <div style={{fontSize:12,fontWeight:600,color:'var(--t3)',textTransform:'uppercase',letterSpacing:'1px',marginBottom:10}}>Ноды</div>
          <div style={{fontSize:42,fontWeight:800,letterSpacing:'-1.5px',color:'var(--t1)',lineHeight:1,marginBottom:14}}>{nodes.length}</div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            <StatPill count={onlineNodes} label="онлайн" color="34,197,94" dot="dot-live"/>
            {nodes.length - onlineNodes > 0 && <StatPill count={nodes.length-onlineNodes} label="офлайн" color="251,113,133" dot=""/>}
          </div>
        </div>
        <div className="card" style={{padding:'20px 24px'}}>
          <div style={{fontSize:12,fontWeight:600,color:'var(--t3)',textTransform:'uppercase',letterSpacing:'1px',marginBottom:10}}>Клиенты</div>
          <div style={{fontSize:42,fontWeight:800,letterSpacing:'-1.5px',color:'var(--t1)',lineHeight:1,marginBottom:14}}>{totalUsers}</div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            <StatPill count={activeProxies} label="активных" color="34,197,94" dot="dot-live"/>
            {totalOnline > 0 && <StatPill count={totalOnline} label="онлайн" color="56,189,248" dot="dot-live"/>}
            {stoppedProxies > 0 && <StatPill count={stoppedProxies} label="остановлен" color="251,113,133" dot=""/>}
          </div>
        </div>
      </div>

      {/* Node cards */}
      <div className="sec-lbl">Ноды</div>
      {loading
        ? <div className="loading-center"><span className="spin"/> Загружаю...</div>
        : (
          <div className="grid-2">
            {nodes.map(node => {
              const s = status.find(x=>x.id===node.id)||{};
              const total   = node._userCount||0;
              const active  = s.containers||0;
              const stopped = total - active;

              return (
                <div className="card" key={node.id}
                  style={{padding:0,overflow:'hidden',cursor:'pointer',transition:'border-color .15s'}}
                  onClick={()=>onSelectNode(node)}>

                  {/* Header row */}
                  <div style={{padding:'18px 20px 14px',borderBottom:'1px solid var(--b1)',display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:12}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:5}}>
                        {node.flag && <img src={flagUrl(node.flag,'w80')} alt={node.flag} style={{width:32,height:24,objectFit:'cover',borderRadius:3,boxShadow:'0 1px 4px rgba(0,0,0,.3)',flexShrink:0}}/>}
                        <span style={{fontSize:18,fontWeight:700,letterSpacing:'-0.3px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                          {node.name}
                        </span>
                      </div>
                      <div style={{fontSize:12,color:'var(--t3)',fontFamily:'var(--mono)'}}>{node.host}</div>
                    </div>
                    <span className={`badge ${s.online?'badge-green':'badge-red'}`} style={{flexShrink:0}}>
                      <span className={`dot ${s.online?'dot-live':''}`}/>{s.online?'онлайн':'офлайн'}
                    </span>
                  </div>

                  {/* stat pills */}
                  <div style={{padding:'12px 20px',display:'flex',gap:8,flexWrap:'wrap',borderBottom:'1px solid var(--b1)'}}>
                    <StatPill count={total}   label="всего"      color="124,111,247" dot={null}/>
                    <StatPill count={active}  label="активных"   color="34,197,94"  dot="dot-live"/>
                    {s.online_users > 0 && <StatPill count={s.online_users} label="онлайн" color="56,189,248" dot="dot-live"/>}
                    {stopped > 0 && <StatPill count={stopped} label="остановлен" color="251,113,133" dot=""/>}
                  </div>

                  {/* Actions */}
                  <div style={{padding:'12px 20px',display:'flex',gap:8}}>
                    <button className="btn btn-primary btn-sm" style={{flex:1,justifyContent:'center'}}
                      onClick={e=>{e.stopPropagation(); onManageNode(node);}}>
                      <I.Users/> Клиенты
                    </button>
                    <button className="btn btn-secondary btn-sm" style={{flex:1,justifyContent:'center'}}
                      onClick={e=>{e.stopPropagation(); onSelectNode(node);}}>
                      <I.Server/> Нода
                    </button>
                  </div>
                </div>
              );
            })}
            {!nodes.length && (
              <div style={{gridColumn:'1/-1'}}>
                <div className="empty"><div className="empty-icon"><I.Server/></div>
                  <div className="empty-title">Нет нод</div><div className="empty-desc">Добавь первую ноду</div>
                </div>
              </div>
            )}
          </div>
        )
      }
    </div>
  );
}

/* ── Node Modal ─────────────────────────────────────────── */
function NodeModal({ node, onClose, onSave }) {
  const [f, setF] = useState(node || {
    name:'', host:'', ssh_user:'root', ssh_port:22,
    base_dir:'/opt/mtg/users', start_port:4433,
    ssh_password:'', ssh_key:'', flag:null, agent_port:8081
  });
  const [loading, setLoading] = useState(false);
  const [auth, setAuth] = useState(node?.ssh_key ? 'key' : 'password');
  const [agentChecking, setAgentChecking] = useState(false);
  const [agentStatus, setAgentStatus] = useState(null); // null | true | false
  const [showInstall, setShowInstall] = useState(false);
  const set = (k,v) => setF(x=>({...x,[k]:v}));

  const submit = async () => {
    if(!f.name||!f.host){toast('Заполни обязательные поля','error');return;}
    setLoading(true);
    try {
      const payload = {...f, ssh_password: auth==='password' ? f.ssh_password : null, ssh_key: auth==='key' ? f.ssh_key : null };
      if(node) { await api('PUT',`/api/nodes/${node.id}`,payload); toast('Нода обновлена','success'); }
      else { await api('POST','/api/nodes',payload); toast('Нода добавлена','success'); }
      onSave();
    } catch(e){toast(e.message,'error');}
    finally{setLoading(false);}
  };

  const [agentUpdating, setAgentUpdating] = useState(false);

  const checkAgent = async () => {
    if(!node?.id) return;
    setAgentChecking(true);
    try {
      const r = await api('GET', `/api/nodes/${node.id}/check-agent`);
      setAgentStatus(r.available);
      toast(r.available ? 'Агент доступен ✓' : 'Агент недоступен', r.available ? 'success' : 'error');
    } catch { setAgentStatus(false); }
    finally { setAgentChecking(false); }
  };

  const updateAgent = async () => {
    if(!node?.id) return;
    setAgentUpdating(true);
    toast('Обновление агента...', 'info');
    try {
      const r = await api('POST', `/api/nodes/${node.id}/update-agent`);
      if(r.ok) toast('Агент обновлён ✓', 'success');
      else toast('Ошибка обновления: ' + (r.error || r.output), 'error');
      setAgentStatus(null);
    } catch(e) { toast('Ошибка: ' + e.message, 'error'); }
    finally { setAgentUpdating(false); }
  };

  const installCmd = `mkdir -p /opt/mtg-agent && cd /opt/mtg-agent && curl -fsSL https://raw.githubusercontent.com/Reibik/-mtg-adminpanel/main/mtg-agent/install-agent.sh | bash`;

  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:520}}>
        <div className="modal-head">
          <div className="modal-title">{node?<><I.Edit/> Редактировать ноду</>:<><I.Plus/> Добавить ноду</>}</div>
          <button className="modal-close" onClick={onClose}><I.X/></button>
        </div>
        <div className="modal-body">
          {/* Basic */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <div className="form-group" style={{gridColumn:'1/-1'}}>
              <label className="form-label">Название *</label>
              <input className="form-input" placeholder="Helsinki" value={f.name} onChange={e=>set('name',e.target.value)} autoFocus/>
            </div>
            <div className="form-group" style={{gridColumn:'1/-1'}}>
              <label className="form-label">Host / IP *</label>
              <input className="form-input" placeholder="hel.maks68.com" value={f.host} onChange={e=>set('host',e.target.value)}/>
            </div>
          </div>
          <div className="form-group">
            <label className="form-label">Флаг страны</label>
            <FlagPicker value={f.flag} onChange={v=>set('flag',v)}/>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <div className="form-group"><label className="form-label">SSH User</label><input className="form-input" placeholder="root" value={f.ssh_user} onChange={e=>set('ssh_user',e.target.value)}/></div>
            <div className="form-group"><label className="form-label">SSH Port</label><input className="form-input" type="number" placeholder="22" value={f.ssh_port} onChange={e=>set('ssh_port',parseInt(e.target.value))}/></div>
            <div className="form-group"><label className="form-label">Base Dir</label><input className="form-input" placeholder="/opt/mtg/users" value={f.base_dir} onChange={e=>set('base_dir',e.target.value)}/></div>
            <div className="form-group"><label className="form-label">Start Port</label><input className="form-input" type="number" placeholder="4433" value={f.start_port} onChange={e=>set('start_port',parseInt(e.target.value))}/></div>
          </div>
          <div className="form-group">
            <label className="form-label">SSH Авторизация</label>
            <div className="radio-group">
              <div className={`radio-btn ${auth==='password'?'on':''}`} onClick={()=>setAuth('password')}><I.Key/> Пароль</div>
              <div className={`radio-btn ${auth==='key'?'on':''}`} onClick={()=>setAuth('key')}><I.Lock/> SSH ключ</div>
            </div>
          </div>
          {auth==='password'
            ? <div className="form-group"><label className="form-label">Пароль</label><input className="form-input" type="password" placeholder="••••••••" value={f.ssh_password||''} onChange={e=>set('ssh_password',e.target.value)}/></div>
            : <div className="form-group"><label className="form-label">Приватный ключ</label><textarea className="form-input" rows={4} placeholder="-----BEGIN OPENSSH PRIVATE KEY-----" value={f.ssh_key||''} onChange={e=>set('ssh_key',e.target.value)} style={{fontFamily:'var(--mono)',fontSize:11,resize:'vertical'}}/></div>
          }

          {/* Agent section */}
          <div style={{borderTop:'1px solid var(--b1)',paddingTop:16,marginTop:4}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
              <div style={{fontSize:13,fontWeight:600,display:'flex',alignItems:'center',gap:8}}>
                <I.Activity/> MTG Agent
                {agentStatus===true && <span className="badge badge-green" style={{fontSize:10}}>доступен</span>}
                {agentStatus===false && <span className="badge badge-red" style={{fontSize:10}}>недоступен</span>}
                {node?.agent_port && agentStatus===null && <span className="badge badge-purple" style={{fontSize:10}}>порт {node.agent_port}</span>}
              </div>
              <div style={{display:'flex',gap:8}}>
                {node && <button className="btn btn-ghost btn-sm" onClick={checkAgent} disabled={agentChecking}>
                  {agentChecking?<><span className="spin spin-sm"/> проверка</>:<><I.Wifi/> Проверить</>}
                </button>}
                {node && <button className="btn btn-secondary btn-sm" onClick={updateAgent} disabled={agentUpdating}>
                  {agentUpdating?<><span className="spin spin-sm"/> обновление...</>:<><I.RefreshCw/> Обновить</>}
                </button>}
                <button className="btn btn-ghost btn-sm" onClick={()=>setShowInstall(!showInstall)}>
                  <I.Download/> Установить
                </button>
              </div>
            </div>
            <div className="form-group">
              <label className="form-label">Порт агента (оставь пустым если не установлен)</label>
              <input className="form-input" type="number" placeholder="8081" value={f.agent_port||''}
                onChange={e=>set('agent_port', e.target.value ? parseInt(e.target.value) : null)}/>
            </div>
            {showInstall && (
              <div style={{background:'var(--bg3)',borderRadius:10,padding:14,border:'1px solid var(--b1)'}}>
                <div style={{fontSize:12,color:'var(--t3)',marginBottom:8}}>Выполни на ноде {f.host}:</div>
                <div style={{display:'flex',gap:8,alignItems:'flex-start'}}>
                  <code style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--cy)',flex:1,wordBreak:'break-all',lineHeight:1.6,background:'var(--bg)',padding:'8px 10px',borderRadius:7,border:'1px solid var(--b1)'}}>
                    {`mkdir -p /opt/mtg-agent && cd /opt/mtg-agent && curl -fsSL https://raw.githubusercontent.com/Reibik/-mtg-adminpanel/main/mtg-agent/install-agent.sh | bash`}
                  </code>
                  <button className="btn btn-secondary btn-sm" style={{flexShrink:0}}
                    onClick={()=>{copyText(`mkdir -p /opt/mtg-agent && cd /opt/mtg-agent && curl -fsSL https://raw.githubusercontent.com/Reibik/-mtg-adminpanel/main/mtg-agent/install-agent.sh | bash`); toast('Скопировано','success');}}>
                    <I.Copy/>
                  </button>
                </div>
                <div style={{fontSize:11,color:'var(--t3)',marginTop:8}}>После установки порт агента: <strong>8081</strong></div>
              </div>
            )}
          </div>
        </div>
        <div className="modal-foot">
          <button className="btn btn-ghost" onClick={onClose}>Отмена</button>
          <button className="btn btn-primary" onClick={submit} disabled={loading}>
            {loading?<span className="spin spin-sm"/>:(node?<><I.Check/> Сохранить</>:<><I.Plus/> Добавить</>)}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ── Nodes List Page ─────────────────────────────────────── */
function NodesPage({ nodes, onReload, onManage, onOpenNode }) {
  const [modal, setModal] = useState(false);
  const [edit, setEdit] = useState(null);
  const [status, setStatus] = useState([]);

  const loadStatus = useCallback(async () => {
    try { const s = await api('GET','/api/status'); setStatus(s); } catch {}
  }, []);

  useEffect(() => {
    loadStatus();
    const t = setInterval(loadStatus, 20000);
    return () => clearInterval(t);
  }, []);

  const del = async (node) => {
    if(!confirm(`Удалить ноду ${node.name}?`)) return;
    try { await api('DELETE',`/api/nodes/${node.id}`); toast('Нода удалена','success'); onReload(); }
    catch(e) { toast(e.message,'error'); }
  };

  return (
    <div className="pg">
      <div className="topbar">
        <div className="topbar-left">
          <div className="page-title"><em>Ноды</em></div>
          <div className="page-desc">{nodes.length} серверов настроено</div>
        </div>
        <div className="topbar-right">
          <button className="btn btn-primary" onClick={()=>{setEdit(null);setModal(true);}}>
            <I.Plus/> Добавить ноду
          </button>
        </div>
      </div>

      {!nodes.length
        ? <div className="card"><div className="empty"><div className="empty-icon"><I.Server/></div><div className="empty-title">Нет нод</div><div className="empty-desc">Добавь первую ноду</div></div></div>
        : (
          <div className="grid-2">
            {nodes.map(node => {
              const s = status.find(x=>x.id===node.id)||{};
              const total   = node._userCount||0;
              const active  = s.containers||0;
              const stopped = total - active;
              return (
                <div className="card" key={node.id} style={{padding:0,overflow:'hidden',cursor:'pointer'}}
                  onClick={()=>onOpenNode(node)}>
                  <div style={{padding:'18px 20px 14px',borderBottom:'1px solid var(--b1)',display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:12}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:5}}>
                        {node.flag && <img src={flagUrl(node.flag,'w80')} alt={node.flag} style={{width:32,height:24,objectFit:'cover',borderRadius:3,boxShadow:'0 1px 4px rgba(0,0,0,.3)',flexShrink:0}}/>}
                        <span style={{fontSize:17,fontWeight:700,letterSpacing:'-0.3px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{node.name}</span>
                        {node.agent_port && <span className="badge badge-purple" style={{fontSize:10,padding:'2px 6px'}}>Agent</span>}
                      </div>
                      <div style={{fontSize:12,color:'var(--t3)',fontFamily:'var(--mono)'}}>{node.host}</div>
                    </div>
                    <span className={`badge ${s.online?'badge-green':'badge-red'}`} style={{flexShrink:0}}>
                      <span className={`dot ${s.online?'dot-live':''}`}/>{s.online?'онлайн':'офлайн'}
                    </span>
                  </div>
                  <div style={{padding:'11px 20px',display:'flex',gap:8,flexWrap:'wrap',borderBottom:'1px solid var(--b1)'}}>
                    <StatPill count={total}  label="всего"      color="124,111,247" dot={null}/>
                    <StatPill count={active} label="активных"   color="34,197,94"  dot="dot-live"/>
                    {s.online_users > 0 && <StatPill count={s.online_users} label="онлайн" color="56,189,248" dot="dot-live"/>}
                    {stopped > 0 && <StatPill count={stopped} label="остановлен" color="251,113,133" dot=""/>}
                  </div>
                  <div style={{padding:'11px 20px',display:'flex',gap:8,alignItems:'center'}}>
                    <button className="btn btn-primary btn-sm" style={{flex:1,justifyContent:'center'}}
                      onClick={e=>{e.stopPropagation();onManage(node);}}>
                      <I.Users/> Клиенты
                    </button>
                    <button className="btn btn-secondary btn-sm" onClick={e=>{e.stopPropagation();setEdit(node);setModal(true);}}>
                      <I.Edit/>
                    </button>
                    <button className="btn btn-danger btn-sm" onClick={e=>{e.stopPropagation();del(node);}}>
                      <I.Trash/>
                    </button>
                  </div>
                </div>
              );
            })}
          </div>
        )
      }
      {modal && <NodeModal node={edit} onClose={()=>setModal(false)} onSave={()=>{setModal(false);onReload();}}/>}
    </div>
  );
}

      const [st, u, tr] = await Promise.allSettled([
        api('GET', `/api/nodes/${node.id}/check`),
        api('GET', `/api/nodes/${node.id}/users`),
        api('GET', `/api/nodes/${node.id}/traffic`),

        </div>
      </div>

      {/* 4 stat pills */}
      {!loading && (
        <div style={{display:'flex',gap:12,marginBottom:16,flexWrap:'wrap'}}>
          <StatPill count={users.length} label="Всего"       color="124,111,247" dot={null}   large/>
          <StatPill count={active}       label="Активных"    color="34,197,94"  dot="dot-live" large/>
          <StatPill count={onlineUsers}  label="Онлайн"      color="56,189,248" dot="dot-live" large/>
          {stopped > 0 && <StatPill count={stopped} label="Остановлен" color="251,113,133" dot="" large/>}
        </div>
      )}

      {/* Clients table */}
      <div className="card">
        {loading ? <div className="loading-center"><span className="spin"/> Загружаю...</div> : (
          <div className="table-wrap">
            <table>
              <thead><tr>
                <th>Клиент</th><th>Порт</th><th>Онлайн</th><th>Устройств</th>
                <th>Трафик</th><th>Статус</th><th>Срок</th><th>Действия</th>
              </tr></thead>
              <tbody>
                {users.map(u => {
                  const traf = u.running ? traffic[u.name] : (u.traffic_rx_snap ? {rx:u.traffic_rx_snap, tx:u.traffic_tx_snap} : traffic[u.name]);
                  return (
                    <tr key={u.id} style={{opacity:u.expired?0.5:1}}>
                      <td><span style={{fontFamily:'var(--mono)',fontWeight:600,fontSize:14}}>{u.name}</span></td>
                      <td><span className="badge badge-purple">{u.port}</span></td>
                      <td>{u.is_online ? <span className="badge badge-green"><span className="dot dot-live"/>онлайн</span> : <span style={{color:'var(--t3)',fontSize:12}}>—</span>}</td>
                      <td><span style={{fontFamily:'var(--mono)',fontWeight:500,fontSize:14,color:u.connections>0?'var(--vi)':'var(--t3)'}}>{u.connections}{u.max_devices?`/${u.max_devices}`:''}</span></td>
                      <td>{traf ? <span className="traf"><span className="rx">↓{traf.rx}</span><span className="tx"> ↑{traf.tx}</span></span> : <span style={{color:'var(--t3)',fontSize:12}}>—</span>}</td>
                      <td><span className={`badge ${u.running?'badge-green':'badge-red'}`}><span className={`dot ${u.running?'dot-live':''}`}/>{u.running?'активен':'остановлен'}</span></td>
                      <td>{expiryBadge(u.expires_at)}</td>
                      <td>
                        <div className="acts">
                          <button className="btn btn-icon btn-secondary btn-sm" onClick={()=>copyText(u.link)} title="Копировать ссылку"><I.Copy/></button>
                          <button className="btn btn-icon btn-secondary btn-sm" onClick={()=>onManage(node)} title="Управление клиентом"><I.Edit/></button>
                        </div>
                      </td>
                    </tr>
                  );
                })}
                {!users.length && <tr><td colSpan={8}><div className="empty"><div className="empty-icon"><I.Users/></div><div className="empty-title">Нет клиентов</div></div></td></tr>}
              </tbody>
            </table>
          </div>
        )}
      </div>

      {modalEdit && <NodeModal node={node} onClose={()=>setModalEdit(false)} onSave={()=>{setModalEdit(false);onReload();}}/>}
    </div>
  );
}

function QRModal({ user, onClose }) {

      new QRCode(ref.current, { text:user.link, width:220, height:220, colorDark:'#000', colorLight:'#fff', correctLevel:QRCode.CorrectLevel.M });
    }
  }, [user.link]);
  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:320}}>
        <div className="modal-head">
          <div className="modal-title"><I.QrCode/> QR — {user.name}</div>
          <button className="modal-close" onClick={onClose}><I.X/></button>
        </div>
        <div className="modal-body" style={{textAlign:'center'}}>
          <div style={{display:'inline-block',padding:16,background:'#fff',borderRadius:12,marginBottom:14}}><div ref={ref}/></div>
          <div className="link-box" style={{maxWidth:'100%',justifyContent:'center'}} onClick={()=>copyText(user.link)}>

}

/* ── Add User Modal ─────────────────────────────────────── */
function AddUserModal({ nodeId, onClose, onSave }) {
  const [f, setF] = useState({name:'',note:'',expires_at:'',traffic_limit_gb:''});
  const [loading, setLoading] = useState(false);
  const set = (k,v) => setF(x=>({...x,[k]:v}));

  const submit = async () => {
    if(!f.name.trim()){toast('Введи имя','error');return;}
    setLoading(true);
    try {
      const u = await api('POST',`/api/nodes/${nodeId}/users`,{
        name:f.name.trim(), note:f.note||'',
        expires_at:f.expires_at||null,
        traffic_limit_gb:f.traffic_limit_gb?parseFloat(f.traffic_limit_gb):null
      });
      toast(`Юзер ${u.name} создан`,'success'); onSave(u);
    } catch(e){toast(e.message,'error');}
    finally{setLoading(false);}
  };

  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:420}}>
        <div className="modal-head">
          <div className="modal-title"><I.Plus/> Добавить юзера</div>
          <button className="modal-close" onClick={onClose}><I.X/></button>
        </div>
        <div className="modal-body">
          <div className="form-group"><label className="form-label">Имя * (латиница)</label>
            <input className="form-input" placeholder="ivan" value={f.name}
              onChange={e=>set('name',e.target.value.toLowerCase().replace(/[^a-z0-9_-]/g,''))}
              onKeyDown={e=>e.key==='Enter'&&submit()} autoFocus/>
          </div>
          <div className="form-group"><label className="form-label">Заметка</label>
            <input className="form-input" placeholder="Иван, оплатил до 01.04" value={f.note} onChange={e=>set('note',e.target.value)}/>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <div className="form-group"><label className="form-label">Истекает</label>
              <input className="form-input" type="datetime-local" value={f.expires_at} onChange={e=>set('expires_at',e.target.value)}/>
            </div>
            <div className="form-group"><label className="form-label">Лимит трафика (ГБ)</label>
              <input className="form-input" type="number" placeholder="∞" min="0" step="0.1" value={f.traffic_limit_gb} onChange={e=>set('traffic_limit_gb',e.target.value)}/>
            </div>
          </div>
        </div>
        <div className="modal-foot">
          <button className="btn btn-ghost" onClick={onClose}>Отмена</button>
          <button className="btn btn-primary" onClick={submit} disabled={loading}>
            {loading?<span className="spin spin-sm"/>:<><I.Check/> Создать</>}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ── Edit User Modal ────────────────────────────────────── */
function EditModal({ user, nodeId, onClose, onSave }) {
  const [f, setF] = useState({
    note: user.note||'',
    expires_at: user.expires_at ? user.expires_at.replace(' ','T').slice(0,16) : '',
    traffic_limit_gb: user.traffic_limit_gb||'',
    max_devices: user.max_devices||'',
    traffic_reset_interval: user.traffic_reset_interval||'never',
  });
  const [loading, setLoading] = useState(false);
  const set = (k,v) => setF(x=>({...x,[k]:v}));

  const submit = async () => {
    setLoading(true);
    try {
      await api('PUT', `/api/nodes/${nodeId}/users/${user.name}`, {
        note: f.note,
        expires_at: f.expires_at||null,
        traffic_limit_gb: f.traffic_limit_gb ? parseFloat(f.traffic_limit_gb) : null,
        max_devices: f.max_devices ? parseInt(f.max_devices) : null,
        traffic_reset_interval: f.traffic_reset_interval !== 'never' ? f.traffic_reset_interval : null,
      });
      toast('Сохранено','success'); onSave();
    } catch(e){toast(e.message,'error');}
    finally{setLoading(false);}
  };

  const fmtBytes = (b) => {
    if(!b) return '0';
    if(b >= 1073741824) return (b/1073741824).toFixed(2)+'GB';
    if(b >= 1048576) return (b/1048576).toFixed(2)+'MB';
    if(b >= 1024) return (b/1024).toFixed(2)+'KB';
    return b+'B';
  };
  const totalRx = fmtBytes(user.total_traffic_rx_bytes);
  const totalTx = fmtBytes(user.total_traffic_tx_bytes);

  const INTERVALS = [
    {v:'never', label:'Не сбрасывать'},
    {v:'daily',   label:'Каждый день'},
    {v:'monthly', label:'Каждый месяц'},
    {v:'yearly',  label:'Каждый год'},
  ];

  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:460}}>
        <div className="modal-head">
          <div className="modal-title"><I.Edit/> Настройки — {user.name}</div>
          <button className="modal-close" onClick={onClose}><I.X/></button>
        </div>
        <div className="modal-body">

          {/* Basic */}
          <div className="form-group">
            <label className="form-label">Заметка</label>
            <input className="form-input" placeholder="Иван, оплатил до 01.04" value={f.note} onChange={e=>set('note',e.target.value)} autoFocus/>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <div className="form-group">
              <label className="form-label">Истекает</label>
              <input className="form-input" type="datetime-local" value={f.expires_at} onChange={e=>set('expires_at',e.target.value)}/>
            </div>
            <div className="form-group">
              <label className="form-label">Лимит трафика (ГБ)</label>
              <input className="form-input" type="number" placeholder="∞" min="0" step="0.1" value={f.traffic_limit_gb} onChange={e=>set('traffic_limit_gb',e.target.value)}/>
            </div>
          </div>

          {/* Device limit */}
          <div style={{borderTop:'1px solid var(--b1)',paddingTop:14,marginTop:4}}>
            <div style={{fontSize:13,fontWeight:600,marginBottom:10,display:'flex',alignItems:'center',gap:8}}>
              <span style={{width:16,height:16,display:'inline-flex',flexShrink:0}}><I.Wifi/></span>
              Ограничения устройств
            </div>
            <div className="form-group">
              <label className="form-label">Макс. одновременных устройств</label>
              <input className="form-input" type="number" placeholder="∞ (без ограничений)"
                min="1" step="1" value={f.max_devices}
                onChange={e=>set('max_devices',e.target.value)}/>
              <div style={{fontSize:11,color:'var(--t3)',marginTop:5}}>
                При превышении прокси автоматически остановится
              </div>
            </div>
          </div>

          {/* Auto traffic reset */}
          <div style={{borderTop:'1px solid var(--b1)',paddingTop:14,marginTop:4}}>
            <div style={{fontSize:13,fontWeight:600,marginBottom:10,display:'flex',alignItems:'center',gap:8}}>
              <span style={{width:16,height:16,display:'inline-flex',flexShrink:0}}><I.RefreshCw/></span>
              Автосброс трафика
            </div>
            <div className="form-group">
              <label className="form-label">Интервал сброса</label>
              <div className="radio-group" style={{flexWrap:'wrap'}}>
                {INTERVALS.map(i => (
                  <div key={i.v} className={`radio-btn ${f.traffic_reset_interval===i.v?'on':''}`}
                    onClick={()=>set('traffic_reset_interval',i.v)}>
                    {i.label}
                  </div>
                ))}
              </div>
            </div>
            {user.next_reset_at && (
              <div style={{fontSize:11,color:'var(--t3)',marginTop:4}}>
                Следующий сброс: <span style={{color:'var(--t2)'}}>{new Date(user.next_reset_at).toLocaleString('ru-RU')}</span>
              </div>
            )}
          </div>

          {/* Total traffic stats */}
          {(user.total_traffic_rx_bytes > 0 || user.total_traffic_tx_bytes > 0) && (
            <div style={{borderTop:'1px solid var(--b1)',paddingTop:14,marginTop:4}}>
              <div style={{fontSize:13,fontWeight:600,marginBottom:8,display:'flex',alignItems:'center',gap:8}}>
                <span style={{width:16,height:16,display:'inline-flex',flexShrink:0}}><I.Activity/></span>
                Накопленный трафик
              </div>
              <div style={{display:'flex',gap:16}}>
                <div style={{background:'var(--bg3)',borderRadius:8,padding:'8px 14px',flex:1,textAlign:'center'}}>
                  <div style={{fontSize:11,color:'var(--t3)',marginBottom:3}}>Получено</div>
                  <div style={{fontFamily:'var(--mono)',fontSize:13,color:'var(--cy)'}}>{totalRx}</div>
                </div>
                <div style={{background:'var(--bg3)',borderRadius:8,padding:'8px 14px',flex:1,textAlign:'center'}}>
                  <div style={{fontSize:11,color:'var(--t3)',marginBottom:3}}>Отправлено</div>
                  <div style={{fontFamily:'var(--mono)',fontSize:13,color:'var(--gr)'}}>{totalTx}</div>
                </div>
              </div>
            </div>
          )}

        </div>
        <div className="modal-foot">
          <button className="btn btn-ghost" onClick={onClose}>Отмена</button>
          <button className="btn btn-primary" onClick={submit} disabled={loading}>
            {loading?<span className="spin spin-sm"/>:<><I.Check/> Сохранить</>}
          </button>
        </div>
      </div>
    </div>
  );
}
